# Builds the backend Docker image and pushes it to GitHub Container Registry
# on every push to main, so the deploy step can pull a versioned image
# without rebuilding from source on the server.
#
# Image URL: ghcr.io/<owner>/<repo>-backend:<sha> and :latest
#
# Uses the repo-scoped GITHUB_TOKEN — no extra secrets required. The package
# is created automatically on first push; make it public via the repo's
# Packages UI if the deploy target can't authenticate to GHCR.
name: Publish backend image

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/publish-backend.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
