name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Vet
        working-directory: backend
        run: go vet ./...

      # Regenerate the OpenAPI-derived types and fail if they drift from
      # what's committed. Catches spec edits not followed by `make gen`
      # and hand-edits to generated files.
      - name: Codegen drift (make gen-check)
        working-directory: backend
        run: make gen-check

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64
          working-directory: backend
          args: --timeout=5m

      - name: Test
        working-directory: backend
        run: go test ./... -count=1 -race

      - name: Build binary
        working-directory: backend
        run: go build -o /dev/null ./cmd/api

      - name: Build Docker image
        working-directory: backend
        run: docker build -t mootd-api:ci .

  frontend:
    name: Frontend (React Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Typecheck
        working-directory: app
        run: npx tsc --noEmit

      - name: Lint
        working-directory: app
        run: npm run lint

      # Regenerate the OpenAPI-derived TS types and fail if they drift
      # from what's committed (mirrors the backend gen-check).
      - name: Codegen drift (gen:check)
        working-directory: app
        run: npm run gen:check

      - name: Test
        working-directory: app
        run: npm test -- --ci --passWithNoTests
