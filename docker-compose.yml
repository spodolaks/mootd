services:
  redis:
    image: redis:7-alpine
    container_name: mootd-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:8.0
    container_name: mootd-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mootd
      MONGO_INITDB_ROOT_PASSWORD: mootd_dev
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand('ping').ok\" --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin | grep 1 >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mootd-backend
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      MONGO_URI: "mongodb://mootd:mootd_dev@mongo:27017/?authSource=admin"
      MONGO_DB: "mootd"
      MONGO_CONNECT_TIMEOUT: "10s"
      SHUTDOWN_TIMEOUT: "10s"
      # Set JWT_SECRET to a strong random value in production.
      # Leaving it unset uses the insecure dev default and logs a warning.
      # JWT_SECRET: "replace-with-a-strong-secret-min-32-chars"
      # ADMIN_JWT_SECRET signs admin-panel tokens. MUST be different from
      # JWT_SECRET — the backend refuses to start with matching secrets.
      # See mootd-admin P0-03 for the separation rationale.
      # ADMIN_JWT_SECRET: "replace-with-a-strong-admin-secret-min-32-chars"
      # CORS_ALLOWED_ORIGINS: "https://app.mootd.com"
      DETECTION_API_KEY: "${DETECTION_API_KEY}"
      BG_REMOVER_BASE_URL: "${BG_REMOVER_BASE_URL:-http://bcgrm-api-1:8000}"
      # DETECTION_API_BASE_URL accepts a comma-separated list
      # (mootd#56). The detector round-robins per request and
      # fails over to a different host on 5xx / network error.
      # Single URL works as before.
      DETECTION_API_BASE_URL: "http://host.docker.internal:8088"
      # Detection backend selector. "singleitem" (default) routes
      # to the singleItemDetection orchestrator at
      # SINGLEITEM_BASE_URL — that service runs the v1 pipeline
      # (detect → describe → ghost-mannequin → HITL gate) and is
      # the source of truth for the admin /hitl-queue rows.
      # Set DETECTION_BACKEND=legacy to fall back to the on-host
      # service at DETECTION_API_BASE_URL.
      # The host.docker.internal default targets a singleitem
      # orchestrator running on the host (e.g. `make run`
      # outside Docker on port 8090). Port 8090 is the local-dev
      # convention because :8080 is commonly held by other dev
      # containers (sf-sql-sync etc.). Override via shell export
      # for production / k8s deployments.
      DETECTION_BACKEND: "${DETECTION_BACKEND:-singleitem}"
      SINGLEITEM_BASE_URL: "${SINGLEITEM_BASE_URL:-http://host.docker.internal:8090}"
      # Authorisation forwarded to the orchestrator's /v1/admin/*
      # endpoints (HITL queue, single-item moderation). MUST match
      # one of the orchestrator's SID_ADMIN_API_KEYS values, or the
      # admin UI gets 401s while the user-side detection (public
      # /v1/single-item/process) still works without it. Pull the
      # value from your singleItemDetection/.env file's
      # SID_ADMIN_API_KEYS (comma-separated; first one is fine).
      SINGLEITEM_API_KEY: "${SINGLEITEM_API_KEY:-}"
      # Flatlay backend (DETECTION_BACKEND=flatlay). Synchronous
      # third-party detect+generate+bg-remove service. Both vars
      # required when the backend is selected; either empty →
      # boot logs a warning and falls back to legacy. Format:
      #   FLATLAY_BASE_URL=http://35.222.97.101:8001
      #   FLATLAY_API_KEY=<token shared in 1Password / secrets store>
      FLATLAY_BASE_URL: "${FLATLAY_BASE_URL:-}"
      FLATLAY_API_KEY: "${FLATLAY_API_KEY:-}"
      # OLLAMA_BASE_URL defaults to http://host.docker.internal:11434
      # OLLAMA_MODEL defaults to qwen3:14b
      # Outfit generator. Set OUTFIT_PROVIDER=claude to use Anthropic Claude
      # for outfit generation; defaults to "ollama" (local Qwen).
      OUTFIT_PROVIDER: "${OUTFIT_PROVIDER:-ollama}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # ANTHROPIC_MODEL defaults to claude-sonnet-4-5
      # ANTHROPIC_VISION defaults to "true" — set to "false" to disable image input
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-}"
      ANTHROPIC_VISION: "${ANTHROPIC_VISION:-}"
      # mootd#64 — outfit critic pass. "true" runs a cheap Haiku-tier
      # QA pass after Generate; outfits scoring <5 trigger one regen.
      # Default OFF until eval shows quality lift.
      OUTFIT_CRITIC_ENABLED: "${OUTFIT_CRITIC_ENABLED:-}"
      OUTFIT_CRITIC_MODEL: "${OUTFIT_CRITIC_MODEL:-}"
      # mootd#65 — per-archetype prompt routing. "true" makes
      # buildSystemPrompt prefer a template named
      # outfit_system_base.<archetype> for the user's top-1 archetype,
      # falling back to the universal one when not curated. Default OFF.
      OUTFIT_PER_ARCHETYPE_PROMPTS: "${OUTFIT_PER_ARCHETYPE_PROMPTS:-}"
      REDIS_URL: "redis://redis:6379"
      # OpenAI DALL-E for generating moodboard backgrounds + surface textures
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Environment — set to "production" in real deploys. Mock-login is
      # unconditionally disabled when ENVIRONMENT=production, regardless of
      # ENABLE_MOCK_LOGIN below.
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      # Mock-login dev endpoint. Fail-closed default ("false"). Only set to
      # "true" for local development.
      ENABLE_MOCK_LOGIN: "${ENABLE_MOCK_LOGIN:-true}"
      # SMTP for the weekly cost report (P4-04 / mootd-admin#32) +
      # the daily founder summary (mootd-admin#99). All-or-nothing:
      # SMTP_HOST + SMTP_FROM + SMTP_TO must all be set for either
      # email path to fire. Without them /reports/weekly/send returns
      # 503 and the daily-summary cron stays disabled.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_TO: "${SMTP_TO:-}"
      # Comma-separated list of addresses receiving the daily founder
      # summary (mootd-admin#99). When set together with SMTP_*, a cron
      # at DAILY_SUMMARY_HOUR_UTC (default 7) sends overnight numbers
      # to every recipient. Empty → daily summary cron stays disabled.
      FOUNDER_EMAILS: "${FOUNDER_EMAILS:-}"
      DAILY_SUMMARY_HOUR_UTC: "${DAILY_SUMMARY_HOUR_UTC:-}"
    networks:
      - default
      - bcgrm_default
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:

networks:
  default: {}
  bcgrm_default:
    external: true
