openapi: 3.1.0

info:
  title: Mootd Admin API
  version: 0.2.0
  description: |
    Internal admin API consumed by [mootd-admin](https://github.com/spodolaks/mootd-admin).

    All endpoints under /admin/v1/* require admin authentication
    (separate JWT issuer: `mootd-admin`). Non-read actions write to
    the `admin_audit` collection via middleware.

    This file is the **source of truth** for admin types. Both the Go
    backend (`mootd/backend/internal/admin/gen/`) and the TS frontend
    (`mootd-admin/apps/admin/lib/api/generated/`) are generated from
    it. Hand-edit the spec, run `make gen` in each repo, commit the
    output.

servers:
  - url: http://127.0.0.1:8089
    description: Local development backend
  - url: https://api.spodolaks.id.lv
    description: Production

# Default security: every endpoint requires the admin bearer unless
# overridden (login + refresh do override — they issue the bearer).
security:
  - adminBearerAuth: []

components:
  securitySchemes:
    adminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Admin access token. Issuer claim `iss: "mootd-admin"`, signed
        with `ADMIN_JWT_SECRET` (distinct from user-side `JWT_SECRET`
        — backend refuses to start if they match). 1-hour TTL.

  responses:
    Unauthorized:
      description: Missing / invalid / expired admin token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BadRequest:
      description: Malformed request body or query.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Admin:
      type: object
      required: [id, email, roles]
      properties:
        id:
          type: string
          example: adm_a1b2c3d4
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [admin, engineer, support, readonly]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        totp:
          type: string
          description: |
            6-digit TOTP. Field is accepted from Phase 0 onwards but
            only validated when the admin's MFAEnforced flag is true
            (P5-02). A supplied TOTP today is silently ignored.
          pattern: "^[0-9]{6}$"

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, admin]
      properties:
        accessToken:
          type: string
          description: 1-hour admin JWT.
        refreshToken:
          type: string
          description: 7-day refresh token, single-use (rotated on every refresh).
        expiresAt:
          type: string
          format: date-time
        admin:
          $ref: "#/components/schemas/Admin"

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UserSummary:
      type: object
      required:
        [
          id,
          email,
          signupDate,
          wardrobeCount,
          outfitCount,
          moodboardCount,
          last7dUploads,
          last7dOutfits,
          last7dSpendUsd,
          isOverBudget,
        ]
      properties:
        id:
          type: string
        email:
          type: string
          description: |
            Redacted (`u***@gmail.com`) unless caller has the `users:pii`
            permission AND `mfa_verified: true`. Phase 0 ships
            unredacted because every admin role currently has full
            PII; redaction lands with P5-04.
        name:
          type: string
        signupDate:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        wardrobeCount:
          type: integer
          format: int64
        outfitCount:
          type: integer
          format: int64
        moodboardCount:
          type: integer
          format: int64
        last7dUploads:
          type: integer
          format: int64
        last7dOutfits:
          type: integer
          format: int64
        last7dSpendUsd:
          type: number
          format: double
          description: |
            Zero-valued today; lights up when P1-01 (LLM call logging)
            + the user_daily_rollup worker land. Field shape is stable.
        isOverBudget:
          type: boolean
          description: Always false until P4-01 (budgets) lands.
        tier:
          type: string
          enum: [free, paid, founder, beta]

    UsersListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        nextCursor:
          type: string

    UserDetail:
      type: object
      description: |
        Drill-through payload for the admin user-detail page (P1-06).
        Combines the existing UserSummary scalar facts with 30-day
        spend + recent LLM calls. Future tabs (Wardrobe / Outfits /
        Moodboards / Budget) extend this with separate paginated
        endpoints; the spec shape stays additive.
      required: [summary, totalSpendUsd, totalCallCount, generatedAt]
      properties:
        summary:
          $ref: "#/components/schemas/UserSummary"
        spendSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
          description: 30-day daily spend (USD) for this user.
        callCountSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
          description: 30-day daily LLM call count for this user.
        recentCalls:
          type: array
          items:
            $ref: "#/components/schemas/LLMCallSnapshot"
          description: Last 25 LLM calls for this user (newest first).
        totalSpendUsd:
          type: number
          format: double
          description: Lifetime spend across all calls.
        totalCallCount:
          type: integer
          format: int64
          description: Lifetime LLM call count.
        generatedAt:
          type: string
          format: date-time

    LLMCallSnapshot:
      type: object
      required:
        [id, userId, provider, model, feature, costUsd, durationMs, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        userEmail:
          type: string
          description: |
            Optional — present when the backend resolves the user
            in-flight. Frontend masks before display unless the
            caller has the `users:pii` permission AND has
            MFA-verified.
        provider:
          type: string
          enum: [anthropic, openai, ollama]
        model:
          type: string
        feature:
          type: string
          description: e.g. "outfit_generate", "detection_submit"
        costUsd:
          type: number
          format: double
        durationMs:
          type: integer
          format: int64
        status:
          type: string
          enum: [success, error, timeout]
        cacheReadTokens:
          type: integer
          format: int64
          description: |
            Anthropic prompt-cache read tokens (charged at ~10% of
            normal input cost). 0 for OpenAI/Ollama, or for Anthropic
            calls that didn't hit cache.
        cacheWriteTokens:
          type: integer
          format: int64
          description: |
            Anthropic prompt-cache write tokens (charged at ~125% of
            normal input cost — the surcharge to seed the cache).
            0 for OpenAI/Ollama.
        createdAt:
          type: string
          format: date-time

    DetectionRunItem:
      description: |
        One generated image inside a detection run — the per-item
        slice of /api/v1/generate's `generated_images` array,
        archived for the admin prompt viewer.
      type: object
      required: [itemType, category, costUsd]
      properties:
        itemType:
          type: string
        category:
          type: string
        promptUsed:
          type: string
          description: The full prompt the detection service sent to gpt-image-1.
        revisedPrompt:
          type: string
          description: The model's reinterpreted prompt (when present).
        costUsd:
          type: number
          format: double
          description: Per-image cost reported by the detection service.
        wardrobeItemId:
          type: string
          description: |
            ID of the wardrobe_items row this image was persisted as,
            when the post-detection pipeline saved it. Empty when the
            user discarded the item before save. Use it to fetch the
            generated image at /v1/wardrobe/items/{id}/image.

    DetectionRun:
      description: |
        Archive of one POST /v1/wardrobe/detect call (P1-04).
        Stores the original photo the user uploaded, every image the
        detection service generated, the per-image prompts, and the
        full per-call cost breakdown. Powers the trace-detail panel
        for `feature: detection_*` rows on /admin/v1/traces.
      type: object
      required: [id, userId, createdAt, durationMs]
      properties:
        id:
          type: string
        userId:
          type: string
        userEmail:
          type: string
          description: Resolved server-side; redaction follows the same convention as elsewhere.
        createdAt:
          type: string
          format: date-time
        durationMs:
          type: integer
          format: int64
        inputImageUrl:
          type: string
          description: |
            Stable URL the admin can fetch the original photo from
            (proxied through /admin/v1/detection-runs/{id}/input-image).
        inputImageContentType:
          type: string
        inputImageBytes:
          type: integer
          format: int64
        overallStyle:
          type: string
        analyzeStats:
          type: object
          description: Token + timing block from /api/v1/analyze.
        generateStats:
          type: object
          description: Token + timing block from /api/v1/generate.
        totalCostUsd:
          type: number
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/DetectionRunItem"
        parentRunId:
          type: string
          description: |
            For admin-triggered re-runs (P1-10), points back at the
            original detection_run whose archived photo was replayed.
            Empty on the original run; set on every child.
        createdBy:
          type: string
          description: |
            Admin ID that triggered this run. Empty for user-driven
            runs (the default — every detection from the app); set
            when an admin replays the archived photo via
            POST /admin/v1/detection-runs/{id}/rerun.
        detectionVersion:
          type: string
          description: |
            Free-text label for which detector build / model
            combination produced this row. Empty for legacy rows;
            populated by reruns from the version field on the
            request body. The detection service is currently
            versionless — this field exists so that when the upstream
            service starts versioning we can dedupe + diff across
            versions without a schema migration.

    DetectionRunRerunRequest:
      description: |
        Re-run an archived detection — admin-only. Replays the
        original photo bytes through the detection pipeline and
        writes a child detection_runs row with `parent_run_id`
        set so the UI can render a side-by-side diff.
      type: object
      properties:
        detectionVersion:
          type: string
          description: |
            Free-text label persisted onto the child run. Surface
            it in the UI as a dropdown populated from
            /admin/v1/detection-runs/versions, with a free-text
            fallback for new versions.

    DetectionRunRerunResponse:
      description: Result of POST /admin/v1/detection-runs/{id}/rerun.
      type: object
      required: [runId, parentRunId]
      properties:
        runId:
          type: string
          description: ID of the new (child) detection_runs row.
        parentRunId:
          type: string
          description: Echoes the path parameter for confirmation.

    DetectionVersionsResponse:
      description: |
        Distinct, non-empty `detectionVersion` values seen across
        all detection_runs. Powers the rerun-modal dropdown.
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items: { type: string }

    UserOutfitCandidate:
      description: |
        One LLM-generated outfit candidate inside an outfit_jobs
        batch. Untyped outfit payload because the wire shape mirrors
        whatever the LLM produced — name / description / items /
        layoutRoles / visualWeights / palette / etc. Frontend
        renders a small subset and offers the rest as raw JSON for
        admin inspection.
      type: object
      additionalProperties: true

    UserOutfitBatch:
      description: |
        One generation request — the persisted outfit_jobs row that
        backs the user's POST /v1/outfits/generate call. Carries
        the candidates the LLM produced + the job's status + when
        it ran so admins can see what was offered alongside what
        the user ultimately picked (Moodboards tab).
      type: object
      required: [id, status, createdAt, candidates]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        error:
          type: string
          description: Populated only when status = failed.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/UserOutfitCandidate"

    UserOutfitsPage:
      description: |
        One page of outfit batches for a user, newest first. Cursor
        pagination on (createdAt desc, _id desc) — same flavour as
        Wardrobe + Moodboards.
      type: object
      required: [batches]
      properties:
        batches:
          type: array
          items:
            $ref: "#/components/schemas/UserOutfitBatch"
        nextCursor:
          type: string

    UserMoodboard:
      description: |
        One saved moodboard surfaced on the admin user-detail page's
        Moodboards tab. Mirrors moodboard.SavedMoodBoard with the
        descriptive fields the admin actually renders. The full
        rendered collage PNG (when present) is reachable via
        imageUrl.
      type: object
      required: [id, date, outfit, createdAt]
      properties:
        id:
          type: string
        date:
          type: string
          description: YYYY-MM-DD — the day the user planned this outfit for.
        outfit:
          type: object
          description: |
            Untyped passthrough of the moodboard's outfit payload
            (name / description / rationale / items / palette /
            archetypeScores / etc.). The admin renders a small
            subset; the rest is available for inspection.
          additionalProperties: true
        imageUrl:
          type: string
          description: |
            Rendered collage PNG. Path-only; admin composes against
            the API base. Empty when the client never uploaded a
            board image (legacy rows).
        createdAt:
          type: string
          format: date-time

    UserMoodboardsPage:
      description: |
        Paginated moodboards for one user. Cursor pagination on
        (createdAt desc, _id desc) — same pattern as the wardrobe
        tab; consistent so the FE infinite-scroll hook reuses.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserMoodboard"
        nextCursor:
          type: string

    UserSpendBucket:
      description: |
        One day's spend slice for a single feature. The Spend tab
        aggregates llm_calls.costUsd grouped by (feature, day) for
        the last 30 days, zero-filled. Renders as a stacked-area
        chart so admins see which feature drives the user's cost.
      type: object
      required: [date, feature, costUsd, callCount]
      properties:
        date:
          type: string
          description: YYYY-MM-DD (UTC).
        feature:
          type: string
          description: e.g. `outfit_generate`, `detection_analyze`, `detection_generate`.
        costUsd:
          type: number
          format: double
        callCount:
          type: integer
          format: int64

    UserCacheDailyBucket:
      description: |
        One day of Anthropic prompt-cache aggregates for a user
        (P4-03 / mootd-admin#31). Empty days are zero-filled at the
        backend so the chart spacing stays uniform.
      type: object
      required: [date, cacheReadTokens, cacheWriteTokens, inputTokens]
      properties:
        date:
          type: string
          description: YYYY-MM-DD (UTC).
        cacheReadTokens:
          type: integer
          format: int64
        cacheWriteTokens:
          type: integer
          format: int64
        inputTokens:
          type: integer
          format: int64
          description: Total input tokens (cache reads are already counted in this number per the v3 schema).
        callCount:
          type: integer
          format: int64

    UserCacheDaily:
      description: |
        30-day cache trend block on UserSpendBreakdown. Rolled-up
        ratios + savings + per-day buckets. Hit ratio definition:
        cacheRead / (cacheRead + cacheWrite + uncachedInput) where
        uncachedInput = inputTokens - cacheReadTokens. Computed
        FE-side from the totals to keep the bucket shape stable.
      type: object
      required: [buckets, totalReadTokens, totalWriteTokens, totalInputTokens]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/UserCacheDailyBucket"
        totalReadTokens:
          type: integer
          format: int64
        totalWriteTokens:
          type: integer
          format: int64
        totalInputTokens:
          type: integer
          format: int64
        approxSavingsUSD:
          type: number
          format: double
          description: Approximate dollar savings from cache reads, using $3/M list - $0.30/M cached for Anthropic. Same approximation as the global /overview cache metrics.

    UserSpendBreakdown:
      description: |
        30-day per-feature spend timeline for one user. The chart
        component groups buckets by feature and renders one stacked
        layer per feature. Empty buckets are zero-filled at the
        backend so the chart spacing stays uniform.
      type: object
      required: [buckets, totalCostUsd]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/UserSpendBucket"
        totalCostUsd:
          type: number
          format: double
          description: Sum across all buckets — the same value as UserDetail.totalSpendUsd, repeated for caller convenience.
        features:
          type: array
          items:
            type: string
          description: Distinct feature labels in the response, in display order (highest spend first).
        cacheDaily:
          $ref: "#/components/schemas/UserCacheDaily"
          description: |
            Per-day Anthropic prompt-cache aggregates over the same
            30-day window (P4-03 / mootd-admin#31). Empty when no
            Anthropic calls hit the window.

    EvalSetSummary:
      description: |
        Header for one eval set on disk (P3-04 / mootd-admin#27).
        `caseCount` is computed at discovery time. Cases themselves
        are not embedded — to inspect them, the admin opens the
        run detail after kicking off a run against the set.
      type: object
      required: [id, name, caseCount]
      properties:
        id:
          type: string
          description: |
            The directory name on disk under `backend/eval/golden/`.
            Stable across restarts; safe to embed in URLs.
        name:
          type: string
          description: Same as id today; kept distinct so a future "display name" override doesn't break URLs.
        caseCount:
          type: integer
        description:
          type: string
          description: Free-text from a top-level `_meta.json` in the set directory, when present.

    EvalSetsList:
      description: All discovered eval sets.
      type: object
      required: [sets]
      properties:
        sets:
          type: array
          items:
            $ref: "#/components/schemas/EvalSetSummary"

    EvalRunRequest:
      description: |
        Body for POST /admin/v1/evals/runs. `evalSetId` must match
        a value returned from /admin/v1/evals/sets.
      type: object
      required: [evalSetId]
      properties:
        evalSetId:
          type: string
        promptVersion:
          type: string
          description: |
            Which prompt template to test. Empty means "use whatever
            outfit.PromptVersion currently is" — the production
            prompt at boot. A future ticket adds a prompt-versioning
            UI that populates this from a registry.

    EvalRunStart:
      description: Echo from POST /admin/v1/evals/runs.
      type: object
      required: [runId, status]
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]

    EvalCaseResult:
      description: |
        One case's outcome. `judgeScore` is 1-5 from an LLM judge
        with a separate prompt; `judgeRationale` is the judge's
        explanation. `automatedChecks` carries the regex/structural
        checks the existing harness already runs (mootd#09e2277) —
        we surface both because they catch different failures.
      type: object
      required: [caseId, status]
      properties:
        caseId:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        judgeScore:
          type: integer
          minimum: 1
          maximum: 5
        judgeRationale:
          type: string
        automatedChecksPassed:
          type: integer
        automatedChecksTotal:
          type: integer
        outfitName:
          type: string
          description: The first outfit's display name (when generation succeeded). Lets the admin scan results without expanding each row.
        outfitJSON:
          type: string
          description: Full LLM output, JSON-stringified. Rendered in a collapsible block on the FE.
        error:
          type: string
        durationMs:
          type: integer
          format: int64
        costUsd:
          type: number
          format: double
          description: LLM cost for this case (outfit gen + judge call).

    EvalRunAggregate:
      description: |
        Roll-up across all cases — avoids the FE having to compute
        these client-side. Updated as the runner progresses.
      type: object
      required: [totalCases, completedCases]
      properties:
        totalCases:
          type: integer
        completedCases:
          type: integer
        passedCases:
          type: integer
          description: Cases where automatedChecksPassed == automatedChecksTotal AND judgeScore >= 4. The "good enough" definition; tweakable.
        avgJudgeScore:
          type: number
          format: double
        totalCostUsd:
          type: number
          format: double

    EvalRun:
      description: |
        One eval run. Status starts as "pending", transitions to
        "processing" when the goroutine picks it up, and lands in
        "completed" or "failed". Cases are written incrementally
        so the FE can show progress while the run is mid-flight.
      type: object
      required: [id, evalSetId, status, createdAt, aggregate]
      properties:
        id:
          type: string
        evalSetId:
          type: string
        evalSetName:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        provider:
          type: string
          description: claude / openai / ollama — the generator the runner used.
        model:
          type: string
        promptVersion:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        cases:
          type: array
          items:
            $ref: "#/components/schemas/EvalCaseResult"
        aggregate:
          $ref: "#/components/schemas/EvalRunAggregate"
        error:
          type: string
          description: Top-level error when status=failed (e.g. eval set not found, all generators down).

    EvalRunsPage:
      description: |
        Paginated list of runs, reverse chrono. Cases are omitted
        from the list view for compactness — fetch the detail
        endpoint to see them.
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/EvalRun"
        nextCursor:
          type: string

    ModelRoutingTier:
      description: |
        One row of the per-tier routing table. `provider` must
        match a Generator implementation registered at server
        boot — today: anthropic, openai, ollama.
      type: object
      required: [tier, provider]
      properties:
        tier:
          type: string
          enum: [free, paid, founder, beta]
        provider:
          type: string
          description: anthropic / openai / ollama
        notes:
          type: string
          description: Free-text rationale captured at PUT time.

    ModelRouting:
      description: |
        Per-tier routing config (P4-05 / mootd-admin#33).
        Returned by GET /admin/v1/model-routing. The mapping is
        stored as a single Mongo doc with the four tier keys and
        is read at every outfit-generation call (with a small
        in-process cache to avoid per-call DB reads).
      type: object
      required: [tiers, providers]
      properties:
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/ModelRoutingTier"
        providers:
          type: array
          items:
            type: string
          description: Provider names available at server boot. Frontend uses this to populate the dropdown — admins can only pick providers the binary has been built and configured to use.
        updatedBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        notes:
          type: string

    ModelRoutingUpdate:
      description: |
        Body for PUT /admin/v1/model-routing. `tiers` must list
        all four tiers; missing entries reject with 400 (no
        partial updates today — keeps the config explicit).
      type: object
      required: [tiers, notes]
      properties:
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/ModelRoutingTier"
        notes:
          type: string
          minLength: 1
          maxLength: 500
          description: Audit-log rationale. Required.

    WeeklyReport:
      description: |
        Aggregated cost + activity report for one ISO week. The
        endpoint is the source of truth; the SMTP email is just a
        rendering of this same shape. Admins can preview via the
        admin UI at any time without triggering a send.
      type: object
      required: [weekLabel, weekStart, weekEnd, totalCostUsd, dau, costPerDauUsd, topUsers, byModel, byFeature]
      properties:
        weekLabel:
          type: string
          description: ISO week label, e.g. "2026-W18".
        weekStart:
          type: string
          format: date-time
          description: Monday 00:00 UTC.
        weekEnd:
          type: string
          format: date-time
          description: Following Monday 00:00 UTC (exclusive).
        totalCostUsd:
          type: number
          format: double
        priorWeekCostUsd:
          type: number
          format: double
          description: For the WoW delta. Empty when no data for the prior week.
        dau:
          type: integer
          description: Distinct users with at least one llm_call in the window.
        costPerDauUsd:
          type: number
          format: double
        topUsers:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyReportUserRow"
        byModel:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyReportFacet"
        byFeature:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyReportFacet"
        incidents:
          type: array
          items:
            type: string
          description: Notable events spotted during aggregation (budget cap hits, cache-rate drops, prompt-version regressions). Free-text per item.
        recommendations:
          type: array
          items:
            type: string
          description: Short next-action suggestions derived from the data.

    WeeklyReportUserRow:
      type: object
      required: [userId, costUsd, callCount]
      properties:
        userId: { type: string }
        userEmail: { type: string }
        costUsd:
          type: number
          format: double
        callCount:
          type: integer
          format: int64

    WeeklyReportFacet:
      description: One row of a "by X" table — used for both byModel and byFeature breakdowns.
      type: object
      required: [label, costUsd, callCount]
      properties:
        label: { type: string }
        costUsd:
          type: number
          format: double
        callCount:
          type: integer
          format: int64
        share:
          type: number
          format: double
          description: Fraction of total cost (0-1).

    WeeklyReportSendResponse:
      type: object
      required: [sent]
      properties:
        sent:
          type: boolean
        recipient:
          type: string
          description: Empty when sent=false.
        weekLabel:
          type: string

    UserBudget:
      description: |
        Per-user spend caps (P4-01 / mootd-admin#29). When the user
        has no `user_budgets` row, the backend returns the system
        defaults with `isDefault: true` so the UI knows to render
        them as placeholders rather than as a saved override.
        Enforcement (auto-downgrade / hard-stop on overrun) is a
        separate concern shipped as P4-02 (mootd-admin#30).
      type: object
      required: [userId, dailyUSD, monthlyUSD, isDefault]
      properties:
        userId:
          type: string
        dailyUSD:
          type: number
          format: double
          description: Daily LLM-spend cap in USD.
        monthlyUSD:
          type: number
          format: double
          description: Monthly LLM-spend cap in USD.
        isDefault:
          type: boolean
          description: |
            True when the user has no override and the response
            carries the system defaults ($2/day, $30/month).
        setBy:
          type: string
          description: Admin id that last wrote this budget. Empty when isDefault.
        setAt:
          type: string
          format: date-time
          description: When the override was last written. Empty when isDefault.
        reason:
          type: string
          description: Free-text rationale captured at write time.
        todaySpendUSD:
          type: number
          format: double
          description: |
            Spend so far today, in USD. Sourced from the
            P4-02 budget tracker (mootd-admin#30). Always present
            as a number (0 when no spend recorded). The UI uses
            this with dailyUSD to render a progress bar.
        suspendedUntil:
          type: string
          format: date-time
          description: |
            Set when a 200% breach has triggered the 24h auto-suspend.
            Empty when the user is in good standing. UI renders a
            warning banner with the timestamp.

    UserBudgetUpdate:
      description: |
        Body for PUT /admin/v1/users/{id}/budget. `reason` is
        required — every budget edit ends up in the audit log with
        the rationale, since "raised the cap on this user from $2 to
        $200" is the kind of change a future support engineer or
        auditor wants context for.
      type: object
      required: [dailyUSD, monthlyUSD, reason]
      properties:
        dailyUSD:
          type: number
          format: double
          minimum: 0
          maximum: 1000
        monthlyUSD:
          type: number
          format: double
          minimum: 0
          maximum: 10000
        reason:
          type: string
          minLength: 1
          maxLength: 500

    UserWardrobeItem:
      description: |
        One clothing item from a user's wardrobe, surfaced to the
        admin user-detail page (mootd-admin#11). Mirrors the
        backend's wardrobe.ClothingItem; pngImageUrl is the
        background-removed PNG when available, otherwise the
        original-shot URL.
      type: object
      required: [id, category, label, createdAt]
      properties:
        id:
          type: string
        category:
          type: string
        label:
          type: string
        imageUrl:
          type: string
          description: |
            Original detection-cropped image URL. May be a signed
            GCS link with expiry — frontend should handle 4xx with
            a placeholder.
        pngImageUrl:
          type: string
          description: Background-removed PNG; absent when the bg-remove worker hasn't processed yet.
        traits:
          type: object
          additionalProperties:
            type: string
          description: Trait key/value pairs (color, fabric, style, occasion, …).
        createdAt:
          type: string
          format: date-time

    UserWardrobePage:
      description: |
        One page of a user's wardrobe items. Cursor pagination on
        (createdAt desc, _id desc). Empty nextCursor signals the
        last page.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserWardrobeItem"
        nextCursor:
          type: string

    LLMCallDetail:
      description: |
        Full llm_calls row including the inline-archived prompt, user
        message, raw model response, and wardrobe item IDs (P1-11
        Step B / mootd-admin#16). Returned by GET
        /admin/v1/traces/{id} for the prompt-viewer side panel.
        Excluded from the /traces list response by design — list rows
        ship the trim LLMCallSnapshot, detail page fetches the heavy
        fields on demand.
      type: object
      required: [id, userId, provider, model, feature, costUsd, durationMs, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        userEmail:
          type: string
        provider:
          type: string
          enum: [anthropic, openai, ollama]
        model:
          type: string
        feature:
          type: string
        costUsd:
          type: number
          format: double
        inputTokens:
          type: integer
          format: int64
        outputTokens:
          type: integer
          format: int64
        cacheReadTokens:
          type: integer
          format: int64
        cacheWriteTokens:
          type: integer
          format: int64
        durationMs:
          type: integer
          format: int64
        status:
          type: string
          enum: [success, error, timeout]
        errorMsg:
          type: string
          description: Truncated error message; populated only when status != success.
        promptVersion:
          type: string
        promptHash:
          type: string
          description: |
            sha256 of `systemPrompt + "\n" + userMessage`. Useful for
            "show every call that used this prompt" queries.
        systemPrompt:
          type: string
        userMessage:
          type: string
        responseRaw:
          type: string
          description: |
            Provider-specific textual model output. Anthropic: tool-use
            input JSON. OpenAI: choices[0].message.content. Ollama:
            response body. Truncated at 64KB; sentinel "…(truncated)"
            suffix indicates partial.
        wardrobeItemIds:
          type: array
          items:
            type: string
          description: Items present in the user's wardrobe at call time.
        detectionRunId:
          type: string
          description: |
            Foreign key to /admin/v1/detection-runs/{id} when this
            llm_calls row was emitted by a detection submission
            (feature starts with `detection_`). Empty for outfit
            generation rows.
        createdAt:
          type: string
          format: date-time

    DailyMetric:
      type: object
      description: |
        One day's value for a sparkline series. Date is YYYY-MM-DD
        in UTC. Series in OverviewMetrics are 30 entries long,
        oldest-first, with zero-fill for days that had no data.
      required: [date, value]
      properties:
        date:
          type: string
        value:
          type: number
          format: double

    OverviewPeriod:
      type: string
      enum: [today, 7d, 30d]
      description: |
        Period selector for the headline metrics. `today` is the
        UTC day so far; `7d`/`30d` are rolling windows ending now.

    OverviewMetrics:
      type: object
      required: [period, spendUsd, callCount, dauApprox, generatedAt]
      properties:
        period:
          $ref: "#/components/schemas/OverviewPeriod"
        spendUsd:
          type: number
          format: double
          description: Total spend across the selected period.
        callCount:
          type: integer
          format: int64
          description: Total LLM calls across the selected period.
        dauApprox:
          type: integer
          format: int64
          description: |
            Distinct user_ids active in the last 24h (heuristic).
            Independent of the period selector — DAU is always today's.
        spendUsdPrior:
          type: number
          format: double
          description: |
            Spend over the prior period of equal length, used to render
            week-over-week deltas. Today → yesterday; 7d → previous 7d;
            30d → previous 30d.
        callCountPrior:
          type: integer
          format: int64
        dauPrior:
          type: integer
          format: int64
        spendSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
          description: 30-day sparkline series for spend (oldest-first).
        callCountSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
        dauSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
        lastCalls:
          type: array
          items:
            $ref: "#/components/schemas/LLMCallSnapshot"
        cacheMetrics:
          $ref: "#/components/schemas/CacheMetrics"
        generatedAt:
          type: string
          format: date-time

    CacheMetrics:
      type: object
      description: |
        Anthropic prompt-cache effectiveness over the selected period.
        Aggregated from llm_calls.cacheReadTokens / cacheWriteTokens.
        All zero when no Anthropic calls hit the period (common in
        Ollama-only dev environments).
      required: [hitRate, readTokens, writeTokens, savingsUsd]
      properties:
        hitRate:
          type: number
          format: double
          description: |
            cache_read / (cache_read + cache_write + uncached_input).
            0.0 = no cache benefit; 1.0 = every input token came from
            cache (impossible in practice; ~0.6-0.8 is healthy).
        readTokens:
          type: integer
          format: int64
          description: Sum of cache_read_input_tokens across the period.
        writeTokens:
          type: integer
          format: int64
          description: Sum of cache_creation_input_tokens (cache seeding).
        savingsUsd:
          type: number
          format: double
          description: |
            Estimated USD saved by cache reads vs uncached pricing.
            Computed as readTokens * (full_input_price - cache_read_price).

    TracesPage:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items:
            $ref: "#/components/schemas/LLMCallSnapshot"
        nextCursor:
          type: string

    SearchHit:
      type: object
      description: |
        One result in a global admin search response. Today only
        `user` results are returned; future kinds (`trace`, `prompt`,
        `audit`) extend the same shape — frontend dispatches on
        `kind`.
      required: [kind, id, title]
      properties:
        kind:
          type: string
          enum: [user]
        id:
          type: string
          description: Stable identifier for navigation (e.g. user `_id`).
        title:
          type: string
          description: |
            Human-readable label. For users, this is the email — the
            frontend masks before display unless caller has the
            `users:pii` permission.
        subtitle:
          type: string
          description: Optional secondary line. For users, the display name.

    SearchResponse:
      type: object
      description: |
        Cross-collection search results. Backed by GET
        /admin/v1/search?q=… — Mongo `$regex` on the obvious
        identifier columns. Capped at 10 hits per kind to bound
        cost; admins refine the query when more is needed.
      required: [hits]
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"

    AuditEntry:
      type: object
      description: |
        One row in the admin_audit collection. Append-only; every
        non-read admin action writes one. Adminemail is denormalised
        at write time so renaming an admin doesn't rewrite history.
      required: [id, adminId, action, at]
      properties:
        id:
          type: string
        adminId:
          type: string
        adminEmail:
          type: string
          description: |
            Captured at write time. Empty when the admin record was
            unavailable at audit time (rare).
        action:
          type: string
          description: |
            Verb-noun action key. Examples seen so far:
            `traces.export`. P5 will add `users.pii_reveal`,
            `roles.granted`, `prompt.published`, etc.
        targetUserId:
          type: string
          description: User the action targeted (when applicable).
        targetEntity:
          type: string
          description: |
            Free-form pointer to the affected entity, e.g.
            `prompt:v3` or `outfit_job:abc123`.
        metadata:
          type: object
          additionalProperties: true
          description: |
            Action-specific payload. CSV exports include the filter
            shape + row count. Schema is action-dependent and not
            validated by the spec.
        at:
          type: string
          format: date-time
        ip:
          type: string
        userAgent:
          type: string

    AuditPage:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        nextCursor:
          type: string

    TracesSummary:
      type: object
      description: |
        Aggregate over the same filter set as GET /admin/v1/traces.
        Independent of pagination: returns totals across the *whole*
        matched set, not just the current page. Powers the "1,234 calls
        · $45.20 · avg 4.2s · p95 12.1s" strip on /traces.
      required: [totalCount, totalCostUsd, avgDurationMs, p95DurationMs]
      properties:
        totalCount:
          type: integer
          format: int64
          description: Number of llm_calls rows matching the filter.
        totalCostUsd:
          type: number
          format: double
          description: Sum of costUsd across the matched set.
        avgDurationMs:
          type: integer
          format: int64
          description: Mean durationMs (rounded). 0 when totalCount == 0.
        p95DurationMs:
          type: integer
          format: int64
          description: 95th-percentile durationMs (interpolated). 0 when totalCount == 0.

    BuildInfo:
      type: object
      description: |
        Compile-time identity of the running backend. Cacheable — value
        never changes between deploys, so the admin UI can display it
        in the sidebar footer without re-fetching.
      required: [version, sha, environment]
      properties:
        version:
          type: string
          description: package.json-style version string (e.g. "0.2.0").
          example: "0.2.0"
        sha:
          type: string
          description: |
            Git short SHA of the build. "dev" when unset (local docker
            builds). Set in production via -ldflags at compile time.
          example: "e21a668"
        environment:
          type: string
          enum: [development, staging, production]
        builtAt:
          type: string
          format: date-time
          description: When the binary was compiled (UTC).

paths:
  /admin/v1/auth/login:
    post:
      operationId: adminLogin
      summary: Sign in with email + password (+ optional TOTP).
      security: [] # unauthenticated entry point
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — access + refresh tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: |
            Invalid credentials. Same message for missing email and wrong
            password — never reveals whether an account exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/v1/auth/refresh:
    post:
      operationId: adminRefresh
      summary: Rotate the access + refresh token pair (refresh is single-use).
      security: [] # the refresh token IS the credential here
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued; old refresh token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Refresh token is unknown, expired, or already revoked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/v1/me:
    get:
      operationId: adminMe
      summary: Verify the current session and return the admin's identity.
      tags: [auth]
      responses:
        "200":
          description: The authenticated admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/build-info:
    get:
      operationId: adminBuildInfo
      summary: Backend version + commit SHA + environment.
      description: |
        Returned values change only on deploy. The admin UI fetches
        this once per session and renders it in the sidebar footer
        so operators always know which backend version is serving.
      tags: [auth]
      responses:
        "200":
          description: Build identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/overview:
    get:
      operationId: adminOverview
      summary: Top-line dashboard metrics + recent-activity feed.
      tags: [overview]
      parameters:
        - name: period
          in: query
          description: |
            Period selector for the headline metrics. Defaults to
            `today` when unset. Sparkline series are always 30 days
            regardless of period — they're the trend, not the
            headline.
          schema:
            $ref: "#/components/schemas/OverviewPeriod"
      responses:
        "200":
          description: Overview metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/v1/users:
    get:
      operationId: adminListUsers
      summary: Paginated list of users with per-user activity summary.
      tags: [users]
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Case-insensitive contains-match on email.
        - name: tier
          in: query
          schema:
            type: string
            enum: [free, paid, founder, beta]
        - name: active
          in: query
          schema: { type: boolean }
          description: When true, restrict to users active in the last 30 days.
        - name: sort
          in: query
          schema:
            type: string
            enum: [-signup, -last_active, -uploads, -outfits, -spend_7d]
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque pagination cursor from a prior response's `nextCursor`.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: One page of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}:
    get:
      operationId: adminGetUser
      summary: |
        Drill-through detail for a single user (P1-06). Foundation
        for the admin user-detail page; tabs (Wardrobe / Outfits /
        Moodboards / Budget) extend with paginated sub-endpoints in
        follow-up tickets.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/detection-runs/{id}:
    get:
      operationId: adminGetDetectionRun
      summary: |
        Archive of one detection submission (input photo + generated
        images + per-image cost). Looked up by the
        `detectionRunId` field on llm_calls rows tagged
        `feature: detection_*`.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Detection run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/detection-runs/versions:
    get:
      operationId: adminListDetectionVersions
      summary: |
        Distinct detection-version labels seen across detection_runs.
        Drives the rerun-modal dropdown so admins pick from versions
        the system has actually run before. Returns an empty list
        when no rerun has ever set the field — UI falls back to a
        free-text input in that case.
      tags: [traces]
      responses:
        "200":
          description: Versions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionVersionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/detection-runs/{id}/rerun:
    post:
      operationId: adminRerunDetectionRun
      summary: |
        Replay the archived photo from detection_runs/{id} through
        the detection pipeline and persist a child run row with
        `parent_run_id` set. Records an audit entry. The new run is
        observation-only — no wardrobe items are created from its
        output (see acceptance criteria on mootd-admin#15).
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionRunRerunRequest"
      responses:
        "200":
          description: Rerun queued + completed (synchronous today).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionRunRerunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Original run or its archived photo not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Detection service failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/detection-runs/{id}/input-image:
    get:
      operationId: adminGetDetectionRunInputImage
      summary: |
        Stream the original photo the user uploaded for this
        detection run. Bytes come from the GridFS bucket where the
        wardrobe handler stored them at submit time.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image bytes (JPEG or PNG).
          content:
            image/*: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Image not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/users/{id}/outfits:
    get:
      operationId: adminListUserOutfits
      summary: |
        Paginated outfit batches (one per generation request) for a
        user (mootd-admin#11 Outfits tab). Each batch carries the
        3-4 candidates the LLM produced. Use the Moodboards tab to
        see which one was saved.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
      responses:
        "200":
          description: Outfits page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOutfitsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}/moodboards:
    get:
      operationId: adminListUserMoodboards
      summary: |
        Paginated saved moodboards for one user (mootd-admin#11
        Moodboards tab). Cursor pagination on createdAt desc.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Moodboards page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMoodboardsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}/spend:
    get:
      operationId: adminGetUserSpend
      summary: |
        30-day per-feature spend breakdown for one user (mootd-admin#11
        Spend tab). Zero-filled at the backend so the chart spacing
        is uniform.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Spend breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSpendBreakdown"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}/budget:
    get:
      operationId: adminGetUserBudget
      summary: |
        Current per-user budget caps (P4-01 / mootd-admin#29).
        When the user has no override, returns the system defaults
        with `isDefault: true` so the UI can render them differently
        (italic, muted) and the admin knows whether they're
        editing-from-scratch or modifying an existing override.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Budget for the user (override or default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBudget"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: adminUpdateUserBudget
      summary: |
        Replace the per-user budget caps. Writes to the
        `user_budgets` collection (upsert by userId) and writes an
        audit row with action=`budget.update` and metadata carrying
        the old + new values + admin-supplied reason. Enforcement
        of these caps is a separate concern (mootd-admin#30 / P4-02).
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBudgetUpdate"
      responses:
        "200":
          description: New budget after the update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBudget"
        "400":
          description: Invalid budget values or missing reason.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/users/{id}/wardrobe:
    get:
      operationId: adminListUserWardrobe
      summary: |
        Paginated wardrobe items for a single user (mootd-admin#11
        wardrobe tab). Cursor pagination on createdAt desc.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Wardrobe page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWardrobePage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/traces:
    get:
      operationId: adminListTraces
      summary: |
        Paginated firehose of llm_calls rows with filters by user / model
        / feature / status / minimum cost / date range. Optionally
        streams the *entire* matched set as CSV when format=csv —
        bypassing cursor pagination — for ad-hoc export.
      tags: [traces]
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: feature
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [success, error, timeout]
        - name: minCost
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on createdAt (RFC-3339).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on createdAt (RFC-3339).
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: format
          in: query
          description: |
            Response format. Default `json` returns a TracesPage with
            cursor pagination. `csv` streams every row matching the
            filter (capped at 50_000) with a CSV `Content-Type` and
            `Content-Disposition: attachment` header. CSV exports are
            audited.
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: One page of LLM call snapshots, or a streamed CSV.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracesPage"
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/traces/{id}:
    get:
      operationId: adminGetTrace
      summary: |
        Single-call detail for the admin prompt viewer (P1-12 /
        mootd-admin#17). Returns the full llm_calls row including
        the archived system prompt + user message + raw model
        response + wardrobe item IDs at call time.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full trace detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMCallDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Trace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/traces/summary:
    get:
      operationId: adminTracesSummary
      summary: |
        Aggregate totals over the current /traces filter — count,
        spend, mean and p95 latency. Independent of pagination so the
        /traces page can show "1,234 calls · $45.20 · avg 4.2s ·
        p95 12.1s" above the table without scanning every page.
      tags: [traces]
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: feature
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [success, error, timeout]
        - name: minCost
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Aggregate over the filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracesSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/search:
    get:
      operationId: adminSearch
      summary: |
        Cross-collection search for the Cmd+K palette and (future)
        global search bar (mootd-admin#92). Today: user-by-email
        only. The kind dispatch in SearchHit is intentional so
        future kinds (trace, prompt, audit) extend without breaking
        callers.
      tags: [search]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: |
            Search query. Case-insensitive contains-match against
            indexed columns. <2 chars returns an empty result set
            (rather than a 400) so caller debouncing is forgiving.
      responses:
        "200":
          description: Search hits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/evals/sets:
    get:
      operationId: adminListEvalSets
      summary: |
        List available eval sets (P3-04 / mootd-admin#27).
        Sets are discovered from `backend/eval/golden/<name>/`
        directories on disk — admins can add new sets by checking
        in JSON files and restarting the backend. A future ticket
        adds an upload UI; today this is intentionally read-only.
      tags: [evals]
      responses:
        "200":
          description: Available eval sets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalSetsList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/evals/runs:
    get:
      operationId: adminListEvalRuns
      summary: |
        List eval runs in reverse chronological order. Each row
        carries the aggregate (pass rate, avg judge score, total
        cost) so the list is useful as a regression dashboard
        without drilling into per-case results.
      tags: [evals]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Paginated runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: adminStartEvalRun
      summary: |
        Kick off a new eval run against the active generator (the
        provider configured by OUTFIT_PROVIDER; per-run model
        selection is a follow-up ticket). Returns 202 immediately
        with a runId; the goroutine runs cases concurrently and
        writes progress to /evals/runs/{id} as it goes.
      tags: [evals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRunRequest"
      responses:
        "202":
          description: Run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunStart"
        "400":
          description: Unknown eval set or bad body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/evals/runs/{id}:
    get:
      operationId: adminGetEvalRun
      summary: |
        Full run detail — case-by-case results with judge score +
        rationale + generated outfit + cost. The list endpoint
        omits the cases array for compactness; this is where the
        admin drills in.
      tags: [evals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/model-routing:
    get:
      operationId: adminGetModelRouting
      summary: |
        Read the per-tier model routing config (P4-05 /
        mootd-admin#33). Ships seeded defaults at boot:
        free→ollama, paid/beta→anthropic, founder→anthropic.
        Admins edit via PUT.
      tags: [routing]
      responses:
        "200":
          description: Routing config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelRouting"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: adminUpdateModelRouting
      summary: |
        Replace the routing config. Writes an audit row with the
        old + new mapping + admin-supplied reason.
      tags: [routing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelRoutingUpdate"
      responses:
        "200":
          description: Updated routing config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelRouting"
        "400":
          description: Invalid tier or unknown provider.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/reports/weekly:
    get:
      operationId: adminGetWeeklyReport
      summary: |
        Render the weekly cost report (P4-04 / mootd-admin#32).
        Defaults to the most recently completed UTC week (Mon-Sun);
        the `week` query parameter overrides to a specific ISO week
        like "2026-W18" for backfill.
      tags: [reports]
      parameters:
        - name: week
          in: query
          schema: { type: string }
          description: ISO week label (YYYY-Www). Defaults to last completed week.
      responses:
        "200":
          description: Report payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReport"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/reports/weekly/send:
    post:
      operationId: adminSendWeeklyReport
      summary: |
        Manually trigger the weekly report email. Idempotent on
        retries — the report is recomputed from llm_calls each
        time. Returns 200 with the recipient + status; 503 when
        SMTP isn't configured (the rendered report is still
        viewable via GET).
      tags: [reports]
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReportSendResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: SMTP not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/audit:
    get:
      operationId: adminListAudit
      summary: |
        Paginated audit-log feed. Foundation for the admin /audit
        page (mootd-admin#95). Filterable by action, target user,
        admin id, date range. Cursor pagination on (at desc, _id desc).
      tags: [audit]
      parameters:
        - name: action
          in: query
          schema: { type: string }
          description: Exact match. e.g. `traces.export`.
        - name: adminId
          in: query
          schema: { type: string }
        - name: targetUserId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `at` (RFC-3339).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on `at` (RFC-3339).
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: One page of audit entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

tags:
  - name: auth
    description: Login + refresh.
  - name: overview
    description: Dashboard top-line metrics.
  - name: audit
    description: Audit log feed.
  - name: search
    description: Cross-collection search for the command palette.
  - name: users
    description: User list + drill-through.
  - name: traces
    description: LLM calls + (eventually) detection runs.
