openapi: 3.1.0

info:
  title: Mootd Admin API
  version: 0.2.0
  description: |
    Internal admin API consumed by [mootd-admin](https://github.com/spodolaks/mootd-admin).

    All endpoints under /admin/v1/* require admin authentication
    (separate JWT issuer: `mootd-admin`). Non-read actions write to
    the `admin_audit` collection via middleware.

    This file is the **source of truth** for admin types. Both the Go
    backend (`mootd/backend/internal/admin/gen/`) and the TS frontend
    (`mootd-admin/apps/admin/lib/api/generated/`) are generated from
    it. Hand-edit the spec, run `make gen` in each repo, commit the
    output.

servers:
  - url: http://127.0.0.1:8089
    description: Local development backend
  - url: https://api.spodolaks.id.lv
    description: Production

# Default security: every endpoint requires the admin bearer unless
# overridden (login + refresh do override — they issue the bearer).
security:
  - adminBearerAuth: []

components:
  securitySchemes:
    adminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Admin access token. Issuer claim `iss: "mootd-admin"`, signed
        with `ADMIN_JWT_SECRET` (distinct from user-side `JWT_SECRET`
        — backend refuses to start if they match). 1-hour TTL.

  responses:
    Unauthorized:
      description: Missing / invalid / expired admin token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BadRequest:
      description: Malformed request body or query.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    MfaChallengeRequired:
      description: |
        Privileged-action gate (P5-02 follow-up). The session is
        authenticated, but the last successful MFA verification falls
        outside the freshness window (default 10 minutes). The FE must
        pop the challenge modal, call POST /admin/v1/auth/mfa/challenge
        with a fresh TOTP/recovery code, and retry the original action
        with the new access token. Distinguishable from a generic
        Unauthorized response by the `requiresFreshMfa: true` flag in
        the body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MfaChallengeRequiredResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Admin:
      type: object
      required: [id, email, roles]
      properties:
        id:
          type: string
          example: adm_a1b2c3d4
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [admin, engineer, support, readonly]
        permissions:
          type: array
          items: { type: string }
          description: |
            Per-permission checks the FE uses to hide nav items
            and buttons (P5-01 / mootd-admin#34). Computed from
            the admin's roles. Stable order across requests for
            cache-friendly snapshotting.
        lastActiveAt:
          type: string
          format: date-time
          description: |
            The admin's previous lastActiveAt value as of the
            current /me hit (mootd-admin#97). Read by the
            dashboard to compute the "since last visit" delta.
            Absent on first login (no previous value).

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        totp:
          type: string
          description: |
            6-digit TOTP. Field is accepted from Phase 0 onwards but
            only validated when the admin's MFAEnforced flag is true
            (P5-02). A supplied TOTP today is silently ignored.
          pattern: "^[0-9]{6}$"

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, admin]
      properties:
        accessToken:
          type: string
          description: 1-hour admin JWT.
        refreshToken:
          type: string
          description: 7-day refresh token, single-use (rotated on every refresh).
        expiresAt:
          type: string
          format: date-time
        admin:
          $ref: "#/components/schemas/Admin"

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    MfaChallengeRequest:
      type: object
      required: [code, refreshToken]
      properties:
        code:
          type: string
          description: |
            6-digit TOTP from the admin's authenticator app, OR an
            unused recovery code (4-4 hex grouping like `abc1-d4fg`).
            Recovery codes are one-time — consuming one removes it
            from the admin's stored list.
        refreshToken:
          type: string
          description: |
            The refresh token of the current session. Used to identify
            *which* session row to bump the MFA-verified-at timestamp
            on, so a stolen refresh token from another device can't
            piggyback on this challenge. The token itself is not
            rotated by this endpoint.
      description: |
        Re-prove MFA without consuming the current refresh token.
        Called by the FE when a privileged-action request returns
        the `requiresFreshMfa: true` 401 response.

    MfaChallengeResponse:
      type: object
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
          description: |
            New admin JWT with `mfa_at` set to the current time. Same
            lifetime as a login-issued access token. Replaces (does
            not augment) the previous access token.
        expiresAt:
          type: string
          format: date-time

    MfaChallengeRequiredResponse:
      type: object
      required: [error, requiresFreshMfa]
      properties:
        error:
          type: string
          example: fresh MFA required
        requiresFreshMfa:
          type: boolean
          enum: [true]
          description: |
            Sentinel flag the FE keys off to distinguish a stale-MFA
            response from a generic 401. Always `true` on this
            response shape.

    MfaEnrollmentRequiredResponse:
      type: object
      required: [error, mfaEnrollmentNeeded]
      properties:
        error:
          type: string
          example: MFA enrollment required
        mfaEnrollmentNeeded:
          type: boolean
          enum: [true]
          description: |
            Sentinel flag the FE keys off when the challenge endpoint
            is hit by an admin who hasn't enrolled MFA. The FE routes
            them to /settings to enroll before retrying the original
            privileged action.

    UserSummary:
      type: object
      required:
        [
          id,
          email,
          signupDate,
          wardrobeCount,
          outfitCount,
          moodboardCount,
          last7dUploads,
          last7dOutfits,
          last7dSpendUsd,
          isOverBudget,
        ]
      properties:
        id:
          type: string
        email:
          type: string
          description: |
            Redacted (`u***@gmail.com`) unless caller has the `users:pii`
            permission AND `mfa_verified: true`. Phase 0 ships
            unredacted because every admin role currently has full
            PII; redaction lands with P5-04.
        name:
          type: string
        signupDate:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        wardrobeCount:
          type: integer
          format: int64
        outfitCount:
          type: integer
          format: int64
        moodboardCount:
          type: integer
          format: int64
        last7dUploads:
          type: integer
          format: int64
        last7dOutfits:
          type: integer
          format: int64
        last7dSpendUsd:
          type: number
          format: double
          description: |
            Zero-valued today; lights up when P1-01 (LLM call logging)
            + the user_daily_rollup worker land. Field shape is stable.
        isOverBudget:
          type: boolean
          description: Always false until P4-01 (budgets) lands.
        tier:
          type: string
          enum: [free, paid, founder, beta]

    UsersListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        nextCursor:
          type: string

    UserDetail:
      type: object
      description: |
        Drill-through payload for the admin user-detail page (P1-06).
        Combines the existing UserSummary scalar facts with 30-day
        spend + recent LLM calls. Future tabs (Wardrobe / Outfits /
        Moodboards / Budget) extend this with separate paginated
        endpoints; the spec shape stays additive.
      required: [summary, totalSpendUsd, totalCallCount, generatedAt]
      properties:
        summary:
          $ref: "#/components/schemas/UserSummary"
        spendSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
          description: 30-day daily spend (USD) for this user.
        callCountSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
          description: 30-day daily LLM call count for this user.
        recentCalls:
          type: array
          items:
            $ref: "#/components/schemas/LLMCallSnapshot"
          description: Last 25 LLM calls for this user (newest first).
        totalSpendUsd:
          type: number
          format: double
          description: Lifetime spend across all calls.
        totalCallCount:
          type: integer
          format: int64
          description: Lifetime LLM call count.
        last7dSessionTimeMs:
          type: integer
          format: int64
          description: |
            Total foregrounded session time in the last 7 days,
            milliseconds. Aggregated from session_end events
            (P2-03 / mootd-admin#20). Zero when no events
            recorded — FE renders that as "—".
        generatedAt:
          type: string
          format: date-time

    LLMCallSnapshot:
      type: object
      required:
        [id, userId, provider, model, feature, costUsd, durationMs, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        userEmail:
          type: string
          description: |
            Optional — present when the backend resolves the user
            in-flight. Frontend masks before display unless the
            caller has the `users:pii` permission AND has
            MFA-verified.
        provider:
          type: string
          enum: [anthropic, openai, ollama]
        model:
          type: string
        feature:
          type: string
          description: e.g. "outfit_generate", "detection_submit"
        costUsd:
          type: number
          format: double
        durationMs:
          type: integer
          format: int64
        status:
          type: string
          enum: [success, error, timeout]
        cacheReadTokens:
          type: integer
          format: int64
          description: |
            Anthropic prompt-cache read tokens (charged at ~10% of
            normal input cost). 0 for OpenAI/Ollama, or for Anthropic
            calls that didn't hit cache.
        cacheWriteTokens:
          type: integer
          format: int64
          description: |
            Anthropic prompt-cache write tokens (charged at ~125% of
            normal input cost — the surcharge to seed the cache).
            0 for OpenAI/Ollama.
        createdAt:
          type: string
          format: date-time

    DetectionRunItem:
      description: |
        One generated image inside a detection run — the per-item
        slice of /api/v1/generate's `generated_images` array,
        archived for the admin prompt viewer.
      type: object
      required: [itemType, category, costUsd]
      properties:
        itemType:
          type: string
        category:
          type: string
        promptUsed:
          type: string
          description: The full prompt the detection service sent to gpt-image-1.
        revisedPrompt:
          type: string
          description: The model's reinterpreted prompt (when present).
        costUsd:
          type: number
          format: double
          description: Per-image cost reported by the detection service.
        wardrobeItemId:
          type: string
          description: |
            ID of the wardrobe_items row this image was persisted as,
            when the post-detection pipeline saved it. Empty when the
            user discarded the item before save. Use it to fetch the
            generated image at /v1/wardrobe/items/{id}/image.

    DetectionRun:
      description: |
        Archive of one POST /v1/wardrobe/detect call (P1-04).
        Stores the original photo the user uploaded, every image the
        detection service generated, the per-image prompts, and the
        full per-call cost breakdown. Powers the trace-detail panel
        for `feature: detection_*` rows on /admin/v1/traces.
      type: object
      required: [id, userId, createdAt, durationMs]
      properties:
        id:
          type: string
        userId:
          type: string
        userEmail:
          type: string
          description: Resolved server-side; redaction follows the same convention as elsewhere.
        createdAt:
          type: string
          format: date-time
        durationMs:
          type: integer
          format: int64
        inputImageUrl:
          type: string
          description: |
            Stable URL the admin can fetch the original photo from
            (proxied through /admin/v1/detection-runs/{id}/input-image).
        inputImageContentType:
          type: string
        inputImageBytes:
          type: integer
          format: int64
        overallStyle:
          type: string
        analyzeStats:
          type: object
          description: Token + timing block from /api/v1/analyze.
        generateStats:
          type: object
          description: Token + timing block from /api/v1/generate.
        totalCostUsd:
          type: number
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/DetectionRunItem"
        parentRunId:
          type: string
          description: |
            For admin-triggered re-runs (P1-10), points back at the
            original detection_run whose archived photo was replayed.
            Empty on the original run; set on every child.
        createdBy:
          type: string
          description: |
            Admin ID that triggered this run. Empty for user-driven
            runs (the default — every detection from the app); set
            when an admin replays the archived photo via
            POST /admin/v1/detection-runs/{id}/rerun.
        detectionVersion:
          type: string
          description: |
            Free-text label for which detector build / model
            combination produced this row. Empty for legacy rows;
            populated by reruns from the version field on the
            request body. The detection service is currently
            versionless — this field exists so that when the upstream
            service starts versioning we can dedupe + diff across
            versions without a schema migration.

    DetectionRunRerunRequest:
      description: |
        Re-run an archived detection — admin-only. Replays the
        original photo bytes through the detection pipeline and
        writes a child detection_runs row with `parent_run_id`
        set so the UI can render a side-by-side diff.
      type: object
      properties:
        detectionVersion:
          type: string
          description: |
            Free-text label persisted onto the child run. Surface
            it in the UI as a dropdown populated from
            /admin/v1/detection-runs/versions, with a free-text
            fallback for new versions.

    DetectionRunRerunResponse:
      description: Result of POST /admin/v1/detection-runs/{id}/rerun.
      type: object
      required: [runId, parentRunId]
      properties:
        runId:
          type: string
          description: ID of the new (child) detection_runs row.
        parentRunId:
          type: string
          description: Echoes the path parameter for confirmation.

    DetectionVersionsResponse:
      description: |
        Distinct, non-empty `detectionVersion` values seen across
        all detection_runs. Powers the rerun-modal dropdown.
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items: { type: string }

    UserOutfitCandidate:
      description: |
        One LLM-generated outfit candidate inside an outfit_jobs
        batch. Untyped outfit payload because the wire shape mirrors
        whatever the LLM produced — name / description / items /
        layoutRoles / visualWeights / palette / etc. Frontend
        renders a small subset and offers the rest as raw JSON for
        admin inspection.
      type: object
      additionalProperties: true

    UserOutfitBatch:
      description: |
        One generation request — the persisted outfit_jobs row that
        backs the user's POST /v1/outfits/generate call. Carries
        the candidates the LLM produced + the job's status + when
        it ran so admins can see what was offered alongside what
        the user ultimately picked (Moodboards tab).
      type: object
      required: [id, status, createdAt, candidates]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        error:
          type: string
          description: Populated only when status = failed.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/UserOutfitCandidate"

    UserOutfitsPage:
      description: |
        One page of outfit batches for a user, newest first. Cursor
        pagination on (createdAt desc, _id desc) — same flavour as
        Wardrobe + Moodboards.
      type: object
      required: [batches]
      properties:
        batches:
          type: array
          items:
            $ref: "#/components/schemas/UserOutfitBatch"
        nextCursor:
          type: string

    UserMoodboard:
      description: |
        One saved moodboard surfaced on the admin user-detail page's
        Moodboards tab. Mirrors moodboard.SavedMoodBoard with the
        descriptive fields the admin actually renders. The full
        rendered collage PNG (when present) is reachable via
        imageUrl.
      type: object
      required: [id, date, outfit, createdAt]
      properties:
        id:
          type: string
        date:
          type: string
          description: YYYY-MM-DD — the day the user planned this outfit for.
        outfit:
          type: object
          description: |
            Untyped passthrough of the moodboard's outfit payload
            (name / description / rationale / items / palette /
            archetypeScores / etc.). The admin renders a small
            subset; the rest is available for inspection.
          additionalProperties: true
        imageUrl:
          type: string
          description: |
            Rendered collage PNG. Path-only; admin composes against
            the API base. Empty when the client never uploaded a
            board image (legacy rows).
        createdAt:
          type: string
          format: date-time

    UserMoodboardsPage:
      description: |
        Paginated moodboards for one user. Cursor pagination on
        (createdAt desc, _id desc) — same pattern as the wardrobe
        tab; consistent so the FE infinite-scroll hook reuses.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserMoodboard"
        nextCursor:
          type: string

    UserSpendBucket:
      description: |
        One day's spend slice for a single feature. The Spend tab
        aggregates llm_calls.costUsd grouped by (feature, day) for
        the last 30 days, zero-filled. Renders as a stacked-area
        chart so admins see which feature drives the user's cost.
      type: object
      required: [date, feature, costUsd, callCount]
      properties:
        date:
          type: string
          description: YYYY-MM-DD (UTC).
        feature:
          type: string
          description: e.g. `outfit_generate`, `detection_analyze`, `detection_generate`.
        costUsd:
          type: number
          format: double
        callCount:
          type: integer
          format: int64

    UserCacheDailyBucket:
      description: |
        One day of Anthropic prompt-cache aggregates for a user
        (P4-03 / mootd-admin#31). Empty days are zero-filled at the
        backend so the chart spacing stays uniform.
      type: object
      required: [date, cacheReadTokens, cacheWriteTokens, inputTokens]
      properties:
        date:
          type: string
          description: YYYY-MM-DD (UTC).
        cacheReadTokens:
          type: integer
          format: int64
        cacheWriteTokens:
          type: integer
          format: int64
        inputTokens:
          type: integer
          format: int64
          description: Total input tokens (cache reads are already counted in this number per the v3 schema).
        callCount:
          type: integer
          format: int64

    UserCacheDaily:
      description: |
        30-day cache trend block on UserSpendBreakdown. Rolled-up
        ratios + savings + per-day buckets. Hit ratio definition:
        cacheRead / (cacheRead + cacheWrite + uncachedInput) where
        uncachedInput = inputTokens - cacheReadTokens. Computed
        FE-side from the totals to keep the bucket shape stable.
      type: object
      required: [buckets, totalReadTokens, totalWriteTokens, totalInputTokens]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/UserCacheDailyBucket"
        totalReadTokens:
          type: integer
          format: int64
        totalWriteTokens:
          type: integer
          format: int64
        totalInputTokens:
          type: integer
          format: int64
        approxSavingsUSD:
          type: number
          format: double
          description: Approximate dollar savings from cache reads, using $3/M list - $0.30/M cached for Anthropic. Same approximation as the global /overview cache metrics.

    UserSpendBreakdown:
      description: |
        30-day per-feature spend timeline for one user. The chart
        component groups buckets by feature and renders one stacked
        layer per feature. Empty buckets are zero-filled at the
        backend so the chart spacing stays uniform.
      type: object
      required: [buckets, totalCostUsd]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/UserSpendBucket"
        totalCostUsd:
          type: number
          format: double
          description: Sum across all buckets — the same value as UserDetail.totalSpendUsd, repeated for caller convenience.
        features:
          type: array
          items:
            type: string
          description: Distinct feature labels in the response, in display order (highest spend first).
        cacheDaily:
          $ref: "#/components/schemas/UserCacheDaily"
          description: |
            Per-day Anthropic prompt-cache aggregates over the same
            30-day window (P4-03 / mootd-admin#31). Empty when no
            Anthropic calls hit the window.

    EvalSetSummary:
      description: |
        Header for one eval set on disk (P3-04 / mootd-admin#27).
        `caseCount` is computed at discovery time. Cases themselves
        are not embedded — to inspect them, the admin opens the
        run detail after kicking off a run against the set.
      type: object
      required: [id, name, caseCount]
      properties:
        id:
          type: string
          description: |
            The directory name on disk under `backend/eval/golden/`.
            Stable across restarts; safe to embed in URLs.
        name:
          type: string
          description: Same as id today; kept distinct so a future "display name" override doesn't break URLs.
        caseCount:
          type: integer
        description:
          type: string
          description: Free-text from a top-level `_meta.json` in the set directory, when present.

    EvalSetsList:
      description: All discovered eval sets.
      type: object
      required: [sets]
      properties:
        sets:
          type: array
          items:
            $ref: "#/components/schemas/EvalSetSummary"

    EvalRunRequest:
      description: |
        Body for POST /admin/v1/evals/runs. `evalSetId` must match
        a value returned from /admin/v1/evals/sets.
      type: object
      required: [evalSetId]
      properties:
        evalSetId:
          type: string
        promptVersion:
          type: string
          description: |
            Which prompt template to test. Empty means "use whatever
            outfit.PromptVersion currently is" — the production
            prompt at boot. A future ticket adds a prompt-versioning
            UI that populates this from a registry.

    EvalRunStart:
      description: Echo from POST /admin/v1/evals/runs.
      type: object
      required: [runId, status]
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]

    EvalCaseResult:
      description: |
        One case's outcome. `judgeScore` is 1-5 from an LLM judge
        with a separate prompt; `judgeRationale` is the judge's
        explanation. `automatedChecks` carries the regex/structural
        checks the existing harness already runs (mootd#09e2277) —
        we surface both because they catch different failures.
      type: object
      required: [caseId, status]
      properties:
        caseId:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        judgeScore:
          type: integer
          minimum: 1
          maximum: 5
        judgeRationale:
          type: string
        automatedChecksPassed:
          type: integer
        automatedChecksTotal:
          type: integer
        outfitName:
          type: string
          description: The first outfit's display name (when generation succeeded). Lets the admin scan results without expanding each row.
        outfitJSON:
          type: string
          description: Full LLM output, JSON-stringified. Rendered in a collapsible block on the FE.
        error:
          type: string
        durationMs:
          type: integer
          format: int64
        costUsd:
          type: number
          format: double
          description: LLM cost for this case (outfit gen + judge call).

    EvalRunAggregate:
      description: |
        Roll-up across all cases — avoids the FE having to compute
        these client-side. Updated as the runner progresses.
      type: object
      required: [totalCases, completedCases]
      properties:
        totalCases:
          type: integer
        completedCases:
          type: integer
        passedCases:
          type: integer
          description: Cases where automatedChecksPassed == automatedChecksTotal AND judgeScore >= 4. The "good enough" definition; tweakable.
        avgJudgeScore:
          type: number
          format: double
        totalCostUsd:
          type: number
          format: double

    EvalRun:
      description: |
        One eval run. Status starts as "pending", transitions to
        "processing" when the goroutine picks it up, and lands in
        "completed" or "failed". Cases are written incrementally
        so the FE can show progress while the run is mid-flight.
      type: object
      required: [id, evalSetId, status, createdAt, aggregate]
      properties:
        id:
          type: string
        evalSetId:
          type: string
        evalSetName:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        provider:
          type: string
          description: claude / openai / ollama — the generator the runner used.
        model:
          type: string
        promptVersion:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        cases:
          type: array
          items:
            $ref: "#/components/schemas/EvalCaseResult"
        aggregate:
          $ref: "#/components/schemas/EvalRunAggregate"
        error:
          type: string
          description: Top-level error when status=failed (e.g. eval set not found, all generators down).

    EvalRunsPage:
      description: |
        Paginated list of runs, reverse chrono. Cases are omitted
        from the list view for compactness — fetch the detail
        endpoint to see them.
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/EvalRun"
        nextCursor:
          type: string

    ModelRoutingTier:
      description: |
        One row of the per-tier routing table. `provider` must
        match a Generator implementation registered at server
        boot — today: anthropic, openai, ollama.
      type: object
      required: [tier, provider]
      properties:
        tier:
          type: string
          enum: [free, paid, founder, beta]
        provider:
          type: string
          description: anthropic / openai / ollama
        notes:
          type: string
          description: Free-text rationale captured at PUT time.

    ModelRouting:
      description: |
        Per-tier routing config (P4-05 / mootd-admin#33).
        Returned by GET /admin/v1/model-routing. The mapping is
        stored as a single Mongo doc with the four tier keys and
        is read at every outfit-generation call (with a small
        in-process cache to avoid per-call DB reads).
      type: object
      required: [tiers, providers]
      properties:
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/ModelRoutingTier"
        providers:
          type: array
          items:
            type: string
          description: Provider names available at server boot. Frontend uses this to populate the dropdown — admins can only pick providers the binary has been built and configured to use.
        updatedBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        notes:
          type: string

    ModelRoutingUpdate:
      description: |
        Body for PUT /admin/v1/model-routing. `tiers` must list
        all four tiers; missing entries reject with 400 (no
        partial updates today — keeps the config explicit).
      type: object
      required: [tiers, notes]
      properties:
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/ModelRoutingTier"
        notes:
          type: string
          minLength: 1
          maxLength: 500
          description: Audit-log rationale. Required.

    WeeklyReport:
      description: |
        Aggregated cost + activity report for one ISO week. The
        endpoint is the source of truth; the SMTP email is just a
        rendering of this same shape. Admins can preview via the
        admin UI at any time without triggering a send.
      type: object
      required: [weekLabel, weekStart, weekEnd, totalCostUsd, dau, costPerDauUsd, topUsers, byModel, byFeature]
      properties:
        weekLabel:
          type: string
          description: ISO week label, e.g. "2026-W18".
        weekStart:
          type: string
          format: date-time
          description: Monday 00:00 UTC.
        weekEnd:
          type: string
          format: date-time
          description: Following Monday 00:00 UTC (exclusive).
        totalCostUsd:
          type: number
          format: double
        priorWeekCostUsd:
          type: number
          format: double
          description: For the WoW delta. Empty when no data for the prior week.
        dau:
          type: integer
          description: Distinct users with at least one llm_call in the window.
        costPerDauUsd:
          type: number
          format: double
        topUsers:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyReportUserRow"
        byModel:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyReportFacet"
        byFeature:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyReportFacet"
        incidents:
          type: array
          items:
            type: string
          description: Notable events spotted during aggregation (budget cap hits, cache-rate drops, prompt-version regressions). Free-text per item.
        recommendations:
          type: array
          items:
            type: string
          description: Short next-action suggestions derived from the data.

    WeeklyReportUserRow:
      type: object
      required: [userId, costUsd, callCount]
      properties:
        userId: { type: string }
        userEmail: { type: string }
        costUsd:
          type: number
          format: double
        callCount:
          type: integer
          format: int64

    WeeklyReportFacet:
      description: One row of a "by X" table — used for both byModel and byFeature breakdowns.
      type: object
      required: [label, costUsd, callCount]
      properties:
        label: { type: string }
        costUsd:
          type: number
          format: double
        callCount:
          type: integer
          format: int64
        share:
          type: number
          format: double
          description: Fraction of total cost (0-1).

    WeeklyReportSendResponse:
      type: object
      required: [sent]
      properties:
        sent:
          type: boolean
        recipient:
          type: string
          description: Empty when sent=false.
        weekLabel:
          type: string

    SessionEventRequest:
      description: |
        One admin-side API call captured for replay (P5-05 /
        mootd-admin#38). Sent fire-and-forget by the FE after
        every request() completes.
      type: object
      required: [sessionId, method, path, status, durationMs]
      properties:
        sessionId:
          type: string
          description: |
            Per-tab uuid generated client-side at boot. Same
            session = same tab from open to close (or until the
            FE's hydrateSession returns null). Sessions don't
            persist across tab close — that's intentional;
            re-opening starts fresh.
        method:
          type: string
          description: GET / POST / PUT / DELETE etc.
        path:
          type: string
          description: |
            Request path (no query string in v1 — admin URLs
            sometimes carry filter values that constitute PII
            on /traces?userId=…; query strings are stripped
            client-side before posting).
        status:
          type: integer
          description: HTTP response status.
        durationMs:
          type: integer
          format: int64

    SessionSummary:
      description: |
        Header for one admin session in the replay list. Computed
        on aggregation; the admin_session_events collection
        stores raw events.
      type: object
      required: [sessionId, adminId, firstAt, lastAt, eventCount]
      properties:
        sessionId:
          type: string
        adminId:
          type: string
        adminEmail:
          type: string
        firstAt:
          type: string
          format: date-time
        lastAt:
          type: string
          format: date-time
        eventCount:
          type: integer
          format: int64
        distinctPaths:
          type: integer
          format: int64
          description: Useful at-a-glance — "did this session touch every surface, or just /users?"
        errorCount:
          type: integer
          format: int64
          description: Events with status >= 400. Spikes here are worth drilling into.

    SessionsPage:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionSummary"
        nextCursor:
          type: string

    SessionDetailEvent:
      description: One event in a session's detail view.
      type: object
      required: [at, method, path, status, durationMs]
      properties:
        at:
          type: string
          format: date-time
        method:
          type: string
        path:
          type: string
        status:
          type: integer
        durationMs:
          type: integer
          format: int64

    SessionDetail:
      type: object
      required: [summary, events]
      properties:
        summary:
          $ref: "#/components/schemas/SessionSummary"
        events:
          type: array
          items:
            $ref: "#/components/schemas/SessionDetailEvent"

    ABTest:
      description: |
        One stored row in `prompt_ab_tests` (P3-05 /
        mootd-admin#28). At most one active per templateName.
      type: object
      required: [id, templateName, productionVersion, candidateVersion, trafficPct, status, startedAt]
      properties:
        id: { type: string }
        templateName: { type: string }
        productionVersion: { type: integer }
        candidateVersion: { type: integer }
        trafficPct:
          type: integer
          description: 1-99 inclusive. 50 = balanced split.
        status:
          type: string
          enum: [active, ended]
        startedBy: { type: string }
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        endedBy: { type: string }
        notes: { type: string }

    ABTestsList:
      type: object
      required: [tests]
      properties:
        tests:
          type: array
          items:
            $ref: "#/components/schemas/ABTest"

    ABTestStart:
      type: object
      required: [candidateVersion, trafficPct, notes]
      properties:
        candidateVersion:
          type: integer
        trafficPct:
          type: integer
          minimum: 1
          maximum: 99
        notes:
          type: string
          minLength: 1
          maxLength: 500

    ABTestEnd:
      type: object
      properties:
        notes:
          type: string
          maxLength: 500

    FunnelStep:
      type: object
      required: [eventName]
      properties:
        eventName:
          type: string
          description: Catalog event name (see mootd-contracts/events/schema.md).
        filters:
          type: object
          additionalProperties: true
          description: |
            Optional equality matches against properties.*.
            Server prefixes "properties." automatically.

    Funnel:
      description: |
        One saved funnel definition (P2-04 / mootd-admin#21).
      type: object
      required: [id, name, steps, windowDays, analysisDays, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStep"
        windowDays:
          type: integer
          description: Step-to-step window. 1-90.
        analysisDays:
          type: integer
          description: How far back to anchor on step 0. 1-180.
        createdBy: { type: string }
        createdAt:
          type: string
          format: date-time

    FunnelsList:
      type: object
      required: [funnels]
      properties:
        funnels:
          type: array
          items:
            $ref: "#/components/schemas/Funnel"

    FunnelCreate:
      type: object
      required: [name, steps]
      properties:
        name:
          type: string
          minLength: 1
        steps:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/FunnelStep"
        windowDays:
          type: integer
          description: Default 7.
        analysisDays:
          type: integer
          description: Default 30.

    FunnelStepStat:
      type: object
      required: [stepIndex, eventName, userCount]
      properties:
        stepIndex: { type: integer }
        eventName: { type: string }
        userCount:
          type: integer
          format: int64
        dropOffRate:
          type: number
          format: double
          description: 0-1 vs the prior step. 0 on step 0.
        cumulative:
          type: number
          format: double
          description: 0-1 vs step 0. 1 on step 0.

    FunnelStats:
      type: object
      required: [funnelId, windowDays, analysisDays, steps, generatedAt]
      properties:
        funnelId: { type: string }
        windowDays: { type: integer }
        analysisDays: { type: integer }
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStepStat"
        generatedAt:
          type: string
          format: date-time

    CohortRetentionCell:
      description: |
        One cell in the retention heatmap (P2-05 /
        mootd-admin#22). offsetN=0 is the cohort bucket itself
        (always 100% retention by definition).
      type: object
      required: [offsetN, users, retention]
      properties:
        offsetN: { type: integer }
        users:
          type: integer
          format: int64
          description: Distinct users from the cohort active in this bucket.
        retention:
          type: number
          format: double
          description: 0-1; users / cohortSize.

    CohortRow:
      description: One cohort row in the retention heatmap.
      type: object
      required: [bucketStart, label, cohortSize, cells]
      properties:
        bucketStart:
          type: string
          format: date-time
        label:
          type: string
          description: |
            Human-readable bucket label. Day → "2026-04-01";
            week → "2026-W17".
        cohortSize:
          type: integer
          format: int64
        cells:
          type: array
          items:
            $ref: "#/components/schemas/CohortRetentionCell"

    PurgeRequest:
      description: |
        Body for DELETE /admin/v1/users/{id}/purge. `notes`
        captures the rationale (ticket link or free text) so the
        audit row carries a "why" alongside the "who/what/when".
      type: object
      required: [notes]
      properties:
        notes:
          type: string
          description: Audit-trail rationale; required.

    PurgeReport:
      description: |
        Result of a successful purge (P2-06 / mootd-admin#23).
        `collections` maps each affected collection name to the
        number of documents deleted; `total` is the sum.
      type: object
      required: [userId, purgedAt, collections, total]
      properties:
        userId: { type: string }
        purgedAt:
          type: string
          format: date-time
        collections:
          type: object
          additionalProperties:
            type: integer
            format: int64
        total:
          type: integer
          format: int64

    CohortRetentionResponse:
      description: |
        Wire shape for GET /admin/v1/retention (P2-05 /
        mootd-admin#22). Up to 30 cohort rows ordered oldest →
        newest. Empty when no signed_up events exist in the
        trailing-30-bucket window.
      type: object
      required: [cohortUnit, n, cohorts, generatedAt]
      properties:
        cohortUnit:
          type: string
          enum: [day, week]
        n:
          type: integer
          description: Number of retention columns.
        cohorts:
          type: array
          items:
            $ref: "#/components/schemas/CohortRow"
        generatedAt:
          type: string
          format: date-time

    PromptTemplate:
      description: |
        One stored version of one named template (P3-01 /
        mootd-admin#24). One row per (name, version) pair.
      type: object
      required: [id, name, version, body, isProduction, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        version:
          type: integer
        body:
          type: string
          description: Free-form template text. {{varName}} placeholders are substituted at render time.
        variables:
          type: array
          items: { type: string }
          description: |
            Detected {{varName}} placeholders in the body, in
            first-appearance order. Stored alongside the body
            so the FE can highlight them without re-parsing.
        isProduction:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        notes:
          type: string

    PromptNamesList:
      type: object
      required: [names]
      properties:
        names:
          type: array
          items: { type: string }

    PromptVersionsList:
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/PromptTemplate"

    PromptVersionCreate:
      description: |
        Body for POST /admin/v1/prompts/{name}. notes is required
        as the audit-log rationale.
      type: object
      required: [body, notes]
      properties:
        body:
          type: string
          minLength: 1
        notes:
          type: string
          minLength: 1
          maxLength: 500

    PromptPromoteRequest:
      type: object
      properties:
        notes:
          type: string
          maxLength: 500

    TraceReplayResponse:
      type: object
      required: [traceId, replayOf, model]
      properties:
        traceId:
          type: string
        replayOf:
          type: string
        model:
          type: string

    PIIRevealRequest:
      description: |
        Body for POST /admin/v1/audit/pii-reveal (P5-04).
        Surface where the reveal happened — UI is the source of
        truth for what the admin actually saw.
      type: object
      required: [targetUserId, kind]
      properties:
        targetUserId:
          type: string
        kind:
          type: string
          enum: [email, wardrobe_image, outfit_label, detection_image]
        entityId:
          type: string
          description: |
            Optional — populated when the reveal is per-row (e.g.
            a specific wardrobe item id). Empty for whole-page
            reveals (e.g. the "reveal email" button on user detail).

    UserBudget:
      description: |
        Per-user spend caps (P4-01 / mootd-admin#29). When the user
        has no `user_budgets` row, the backend returns the system
        defaults with `isDefault: true` so the UI knows to render
        them as placeholders rather than as a saved override.
        Enforcement (auto-downgrade / hard-stop on overrun) is a
        separate concern shipped as P4-02 (mootd-admin#30).
      type: object
      required: [userId, dailyUSD, monthlyUSD, isDefault]
      properties:
        userId:
          type: string
        dailyUSD:
          type: number
          format: double
          description: Daily LLM-spend cap in USD.
        monthlyUSD:
          type: number
          format: double
          description: Monthly LLM-spend cap in USD.
        isDefault:
          type: boolean
          description: |
            True when the user has no override and the response
            carries the system defaults ($2/day, $30/month).
        setBy:
          type: string
          description: Admin id that last wrote this budget. Empty when isDefault.
        setAt:
          type: string
          format: date-time
          description: When the override was last written. Empty when isDefault.
        reason:
          type: string
          description: Free-text rationale captured at write time.
        todaySpendUSD:
          type: number
          format: double
          description: |
            Spend so far today, in USD. Sourced from the
            P4-02 budget tracker (mootd-admin#30). Always present
            as a number (0 when no spend recorded). The UI uses
            this with dailyUSD to render a progress bar.
        suspendedUntil:
          type: string
          format: date-time
          description: |
            Set when a 200% breach has triggered the 24h auto-suspend.
            Empty when the user is in good standing. UI renders a
            warning banner with the timestamp.

    UserBudgetUpdate:
      description: |
        Body for PUT /admin/v1/users/{id}/budget. `reason` is
        required — every budget edit ends up in the audit log with
        the rationale, since "raised the cap on this user from $2 to
        $200" is the kind of change a future support engineer or
        auditor wants context for.
      type: object
      required: [dailyUSD, monthlyUSD, reason]
      properties:
        dailyUSD:
          type: number
          format: double
          minimum: 0
          maximum: 1000
        monthlyUSD:
          type: number
          format: double
          minimum: 0
          maximum: 10000
        reason:
          type: string
          minLength: 1
          maxLength: 500

    UserTier:
      description: |
        Per-user tier authoring (P4-05 follow-up). Pairs with the
        ModelRouting config — admins promote a user to "paid" via
        PUT /admin/v1/users/{id}/tier and the next outfit
        generation hits the provider configured for that tier in
        ModelRouting. When the user has no `user_tiers` row, the
        backend returns the system default ("free") with
        `isDefault: true` so the UI knows to render it as a
        placeholder.
      type: object
      required: [userId, tier, isDefault]
      properties:
        userId:
          type: string
        tier:
          type: string
          enum: [free, paid, founder, beta]
        isDefault:
          type: boolean
          description: |
            True when the user has no override and the response
            carries the system default ("free").
        setBy:
          type: string
          description: Admin id that last wrote this tier. Empty when isDefault.
        setAt:
          type: string
          format: date-time
          description: When the override was last written. Empty when isDefault.
        reason:
          type: string
          description: Free-text rationale captured at write time.

    UserTierUpdate:
      description: |
        Body for PUT /admin/v1/users/{id}/tier. `reason` is
        required — every tier edit ends up in the audit log with
        rationale, since promoting a user changes which provider
        their outfit-gen calls hit (and therefore the per-call
        cost).
      type: object
      required: [tier, reason]
      properties:
        tier:
          type: string
          enum: [free, paid, founder, beta]
        reason:
          type: string
          minLength: 1
          maxLength: 500

    UserWardrobeItem:
      description: |
        One clothing item from a user's wardrobe, surfaced to the
        admin user-detail page (mootd-admin#11). Mirrors the
        backend's wardrobe.ClothingItem; pngImageUrl is the
        background-removed PNG when available, otherwise the
        original-shot URL.
      type: object
      required: [id, category, label, createdAt]
      properties:
        id:
          type: string
        category:
          type: string
        label:
          type: string
        imageUrl:
          type: string
          description: |
            Original detection-cropped image URL. May be a signed
            GCS link with expiry — frontend should handle 4xx with
            a placeholder.
        pngImageUrl:
          type: string
          description: Background-removed PNG; absent when the bg-remove worker hasn't processed yet.
        traits:
          type: object
          additionalProperties:
            type: string
          description: Trait key/value pairs (color, fabric, style, occasion, …).
        createdAt:
          type: string
          format: date-time

    UserWardrobePage:
      description: |
        One page of a user's wardrobe items. Cursor pagination on
        (createdAt desc, _id desc). Empty nextCursor signals the
        last page.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserWardrobeItem"
        nextCursor:
          type: string

    LLMCallDetail:
      description: |
        Full llm_calls row including the inline-archived prompt, user
        message, raw model response, and wardrobe item IDs (P1-11
        Step B / mootd-admin#16). Returned by GET
        /admin/v1/traces/{id} for the prompt-viewer side panel.
        Excluded from the /traces list response by design — list rows
        ship the trim LLMCallSnapshot, detail page fetches the heavy
        fields on demand.
      type: object
      required: [id, userId, provider, model, feature, costUsd, durationMs, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        userEmail:
          type: string
        provider:
          type: string
          enum: [anthropic, openai, ollama]
        model:
          type: string
        feature:
          type: string
        costUsd:
          type: number
          format: double
        inputTokens:
          type: integer
          format: int64
        outputTokens:
          type: integer
          format: int64
        cacheReadTokens:
          type: integer
          format: int64
        cacheWriteTokens:
          type: integer
          format: int64
        durationMs:
          type: integer
          format: int64
        status:
          type: string
          enum: [success, error, timeout]
        errorMsg:
          type: string
          description: Truncated error message; populated only when status != success.
        promptVersion:
          type: string
        promptHash:
          type: string
          description: |
            sha256 of `systemPrompt + "\n" + userMessage`. Useful for
            "show every call that used this prompt" queries.
        systemPrompt:
          type: string
        userMessage:
          type: string
        responseRaw:
          type: string
          description: |
            Provider-specific textual model output. Anthropic: tool-use
            input JSON. OpenAI: choices[0].message.content. Ollama:
            response body. Truncated at 64KB; sentinel "…(truncated)"
            suffix indicates partial.
        wardrobeItemIds:
          type: array
          items:
            type: string
          description: Items present in the user's wardrobe at call time.
        detectionRunId:
          type: string
          description: |
            Foreign key to /admin/v1/detection-runs/{id} when this
            llm_calls row was emitted by a detection submission
            (feature starts with `detection_`). Empty for outfit
            generation rows.
        replayOf:
          type: string
          description: |
            For admin-triggered replays (P3-03 / mootd-admin#26),
            points back at the original trace. Empty on rows
            generated by real users.
        createdAt:
          type: string
          format: date-time

    DailyMetric:
      type: object
      description: |
        One day's value for a sparkline series. Date is YYYY-MM-DD
        in UTC. Series in OverviewMetrics are 30 entries long,
        oldest-first, with zero-fill for days that had no data.
      required: [date, value]
      properties:
        date:
          type: string
        value:
          type: number
          format: double

    OverviewPeriod:
      type: string
      enum: [today, 7d, 30d]
      description: |
        Period selector for the headline metrics. `today` is the
        UTC day so far; `7d`/`30d` are rolling windows ending now.

    OverviewMetrics:
      type: object
      required: [period, spendUsd, callCount, dauApprox, generatedAt]
      properties:
        period:
          $ref: "#/components/schemas/OverviewPeriod"
        spendUsd:
          type: number
          format: double
          description: Total spend across the selected period.
        callCount:
          type: integer
          format: int64
          description: Total LLM calls across the selected period.
        dauApprox:
          type: integer
          format: int64
          description: |
            Distinct user_ids active in the last 24h (heuristic).
            Independent of the period selector — DAU is always today's.
        spendUsdPrior:
          type: number
          format: double
          description: |
            Spend over the prior period of equal length, used to render
            week-over-week deltas. Today → yesterday; 7d → previous 7d;
            30d → previous 30d.
        callCountPrior:
          type: integer
          format: int64
        dauPrior:
          type: integer
          format: int64
        spendSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
          description: 30-day sparkline series for spend (oldest-first).
        callCountSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
        dauSeries:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"
        spendSeriesByFeature:
          type: array
          description: |
            Per-feature 30-day spend sparks (mootd-admin#94).
            Ordered by total period spend desc; the sum
            across features equals spendSeries day-for-day.
            Features past the per-request cap fold into a
            synthetic "other" entry so cardinality stays
            bounded.
          items:
            $ref: "#/components/schemas/SpendByFeatureSeries"
        sinceLastVisit:
          $ref: "#/components/schemas/SinceDelta"
        lastCalls:
          type: array
          items:
            $ref: "#/components/schemas/LLMCallSnapshot"
        cacheMetrics:
          $ref: "#/components/schemas/CacheMetrics"
        generatedAt:
          type: string
          format: date-time

    SpendByFeatureSeries:
      description: |
        One 30-day spend spark for a single feature label
        (mootd-admin#94). Series is zero-filled to 30 rows
        oldest-first; a feature with no calls in the window
        still gets 30 zeroes so the FE's stack ordering stays
        stable across refreshes.
      type: object
      required: [feature, series]
      properties:
        feature:
          type: string
          description: Feature label as recorded on llm_calls (e.g. "outfit_generate").
        series:
          type: array
          items:
            $ref: "#/components/schemas/DailyMetric"

    SinceDelta:
      description: |
        "What changed since I last looked" summary
        (mootd-admin#97). Counts cover the half-open interval
        [since, now). spendChangePct compares window spend to
        an equal-length window immediately before it; absent
        when the prior window had zero spend (avoids
        divide-by-zero).
      type: object
      required: [since, durationMinutes, newErrors, newSignups, spendUsd]
      properties:
        since:
          type: string
          format: date-time
        durationMinutes:
          type: integer
          format: int64
        newErrors:
          type: integer
          format: int64
        newSignups:
          type: integer
          format: int64
        spendUsd:
          type: number
          format: double
        spendChangePct:
          type: number
          format: double
          description: |
            (current / prior) - 1. 0.18 = +18% vs the prior
            window. Omitted when prior == 0.
        overBudgetUsers:
          type: integer
          format: int64
          description: |
            Best-effort. 0 when the budget reader (P4-02 / mootd-admin#30)
            isn't wired into the admin handler in this build.

    CacheMetrics:
      type: object
      description: |
        Anthropic prompt-cache effectiveness over the selected period.
        Aggregated from llm_calls.cacheReadTokens / cacheWriteTokens.
        All zero when no Anthropic calls hit the period (common in
        Ollama-only dev environments).
      required: [hitRate, readTokens, writeTokens, savingsUsd]
      properties:
        hitRate:
          type: number
          format: double
          description: |
            cache_read / (cache_read + cache_write + uncached_input).
            0.0 = no cache benefit; 1.0 = every input token came from
            cache (impossible in practice; ~0.6-0.8 is healthy).
        readTokens:
          type: integer
          format: int64
          description: Sum of cache_read_input_tokens across the period.
        writeTokens:
          type: integer
          format: int64
          description: Sum of cache_creation_input_tokens (cache seeding).
        savingsUsd:
          type: number
          format: double
          description: |
            Estimated USD saved by cache reads vs uncached pricing.
            Computed as readTokens * (full_input_price - cache_read_price).

    TracesPage:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items:
            $ref: "#/components/schemas/LLMCallSnapshot"
        nextCursor:
          type: string

    SearchHit:
      type: object
      description: |
        One result in a global admin search response. Today only
        `user` results are returned; future kinds (`trace`, `prompt`,
        `audit`) extend the same shape — frontend dispatches on
        `kind`.
      required: [kind, id, title]
      properties:
        kind:
          type: string
          enum: [user]
        id:
          type: string
          description: Stable identifier for navigation (e.g. user `_id`).
        title:
          type: string
          description: |
            Human-readable label. For users, this is the email — the
            frontend masks before display unless caller has the
            `users:pii` permission.
        subtitle:
          type: string
          description: Optional secondary line. For users, the display name.

    SearchResponse:
      type: object
      description: |
        Cross-collection search results. Backed by GET
        /admin/v1/search?q=… — Mongo `$regex` on the obvious
        identifier columns. Capped at 10 hits per kind to bound
        cost; admins refine the query when more is needed.
      required: [hits]
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"

    AuditEntry:
      type: object
      description: |
        One row in the admin_audit collection. Append-only; every
        non-read admin action writes one. Adminemail is denormalised
        at write time so renaming an admin doesn't rewrite history.
      required: [id, adminId, action, at]
      properties:
        id:
          type: string
        adminId:
          type: string
        adminEmail:
          type: string
          description: |
            Captured at write time. Empty when the admin record was
            unavailable at audit time (rare).
        action:
          type: string
          description: |
            Verb-noun action key. Examples seen so far:
            `traces.export`. P5 will add `users.pii_reveal`,
            `roles.granted`, `prompt.published`, etc.
        targetUserId:
          type: string
          description: User the action targeted (when applicable).
        targetEntity:
          type: string
          description: |
            Free-form pointer to the affected entity, e.g.
            `prompt:v3` or `outfit_job:abc123`.
        metadata:
          type: object
          additionalProperties: true
          description: |
            Action-specific payload. CSV exports include the filter
            shape + row count. Schema is action-dependent and not
            validated by the spec.
        at:
          type: string
          format: date-time
        ip:
          type: string
        userAgent:
          type: string

    AuditPage:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        nextCursor:
          type: string

    TracesSummary:
      type: object
      description: |
        Aggregate over the same filter set as GET /admin/v1/traces.
        Independent of pagination: returns totals across the *whole*
        matched set, not just the current page. Powers the "1,234 calls
        · $45.20 · avg 4.2s · p95 12.1s" strip on /traces.
      required: [totalCount, totalCostUsd, avgDurationMs, p95DurationMs]
      properties:
        totalCount:
          type: integer
          format: int64
          description: Number of llm_calls rows matching the filter.
        totalCostUsd:
          type: number
          format: double
          description: Sum of costUsd across the matched set.
        avgDurationMs:
          type: integer
          format: int64
          description: Mean durationMs (rounded). 0 when totalCount == 0.
        p95DurationMs:
          type: integer
          format: int64
          description: 95th-percentile durationMs (interpolated). 0 when totalCount == 0.

    BuildInfo:
      type: object
      description: |
        Compile-time identity of the running backend. Cacheable — value
        never changes between deploys, so the admin UI can display it
        in the sidebar footer without re-fetching.
      required: [version, sha, environment]
      properties:
        version:
          type: string
          description: package.json-style version string (e.g. "0.2.0").
          example: "0.2.0"
        sha:
          type: string
          description: |
            Git short SHA of the build. "dev" when unset (local docker
            builds). Set in production via -ldflags at compile time.
          example: "e21a668"
        environment:
          type: string
          enum: [development, staging, production]
        builtAt:
          type: string
          format: date-time
          description: When the binary was compiled (UTC).

    # === singleItemDetection v1 ====================================
    # Schemas covering the singleItemDetection orchestrator's
    # ClothingItem extension. Source of truth for the field shapes is
    # the Go type in github.com/spodolaks/singleItemDetection
    # (internal/domain.ClothingItem) and the JSON schema for the
    # structured description (schema/garment_description.schema.json).
    # See types/clothing-item-v1.md for the cross-repo narrative.

    SingleItemDetectionItem:
      description: |
        Full v1 ClothingItem produced by singleItemDetection's
        Phase1Pipeline. Superset of UserWardrobeItem — the admin HITL
        queue page (mootd-admin#34) renders this shape; the wardrobe
        list page sticks with the slim UserWardrobeItem to keep the
        list response tight.

        SchemaVersion is bumped per docs/adr-001-schema-versioning.md
        in the singleItemDetection repo. Consumers should read the
        version field and migrate forward as needed; the orchestrator
        always writes the current version.
      type: object
      required:
        - id
        - category
        - imageUrl
        - schemaVersion
        - hitlRequired
        - createdAt
      properties:
        id:
          type: string
        category:
          type: string
          description: Closed enum from schema/enums.json (top, bottom, outerwear, …).
        label:
          type: string
        imageUrl:
          type: string
          description: Source image URL (typically a GridFS gridfs:// or signed link).
        pngImageUrl:
          type: string
          description: Background-removed PNG (the ghost-mannequin generation when present).
        schemaVersion:
          type: string
          description: Semver string. Currently "1.0.0".
          example: "1.0.0"
        source:
          $ref: "#/components/schemas/SingleItemDetectionSource"
        structuredDescription:
          type: object
          additionalProperties: true
          description: |
            Full GarmentDescription per
            schema/garment_description.schema.json. Inlined as a free
            object here because the closed-enum vocabulary is large and
            evolves independently of the OpenAPI spec — consumers
            validate against the JSON schema directly.
        maskUrl:
          type: string
          description: Binary segmentation mask (PNG).
        alphaUrl:
          type: string
          description: Soft alpha matte (PNG, 8-bit).
        generationImageUrl:
          type: string
          description: Ghost-mannequin / catalogue render PNG.
        confidenceOverall:
          type: number
          format: double
          minimum: 0
          maximum: 1
        confidencePerAttribute:
          type: object
          additionalProperties:
            type: number
            format: double
            minimum: 0
            maximum: 1
          description: Per-attribute confidence (key = dotted path into structuredDescription).
        hitlRequired:
          type: boolean
          description: True when the item routed to the human review queue.
        hitlReason:
          $ref: "#/components/schemas/SingleItemDetectionHitlReason"
        pipelineMetadata:
          $ref: "#/components/schemas/SingleItemDetectionPipelineMetadata"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SingleItemDetectionSource:
      type: object
      required: [imageUrl, view, isCropped]
      properties:
        imageUrl:
          type: string
        view:
          type: string
          description: Closed enum from schema/enums.json (front, back, side, detail, lay_flat).
          example: front
        isCropped:
          type: boolean

    SingleItemDetectionHitlReason:
      type: string
      description: |
        Reason the orchestrator flagged this item for human review.
        Closed enum — additions land in lockstep with the
        Phase1Pipeline's hitlReason switch.
      enum:
        - mask_too_small
        - mask_too_large
        - partial_framing
        - seg_inconsistent
        - multi_item
        - fashionsiglip_low
        - cost_breaker
        - stage2_cost_capped
        - mock_in_premium
        - gate_fail_g1
        - gate_fail_g3
        - gate_fail_g6

    SingleItemDetectionPipelineMetadata:
      type: object
      description: Per-item provenance the orchestrator stamps on every completed item.
      required: [totalCostUsd, totalLatencyMs, retryCount]
      properties:
        detectorModel:
          type: string
          example: "grounding-dino+sam-3"
        describerModels:
          type: array
          items:
            type: string
          description: One entry per ensemble member (claude-opus-4-7, gpt-5, gemini-2.5-pro, …).
        generatorModel:
          type: string
          example: "photoroom"
        promptVersion:
          type: string
          example: "v1.0.0"
        totalCostUsd:
          type: number
          format: double
          minimum: 0
        totalLatencyMs:
          type: integer
          format: int64
          minimum: 0
        retryCount:
          type: integer
          minimum: 0
          description: Sum of retries across stages 1, 2, 3.

    SingleItemDetectionJobStatus:
      type: string
      description: |
        Closed enum mirroring storage.JobStatus in the
        singleItemDetection orchestrator. Admin actions move terminal
        items between completed/failed and reviewed/rejected.
      enum: [pending, running, completed, failed, reviewed, rejected]

    SingleItemDetectionAuditEntry:
      type: object
      description: One append-only review action on a HITL job.
      required: [ts, apiKey, action]
      properties:
        ts:
          type: string
          format: date-time
        apiKey:
          type: string
          description: |
            Last-4 fingerprint of the admin API key that performed the
            action (e.g. "…ab12") — full key never persisted.
        action:
          type: string
          enum: [approve, reject, patch_attributes, regenerate]
        reason:
          type: string
        details:
          type: string

    SingleItemDetectionJob:
      type: object
      description: |
        Wrapper the admin queue endpoints return: the orchestrator's
        Job record (status + lifecycle metadata + audit) with the
        v1 ClothingItem nested under `item` when one was produced.
      required: [requestId, status, createdAt, updatedAt]
      properties:
        requestId:
          type: string
        status:
          $ref: "#/components/schemas/SingleItemDetectionJobStatus"
        sourceUrl:
          type: string
        tier:
          type: string
          description: Orchestrator tier the job ran under (premium|balanced).
        item:
          $ref: "#/components/schemas/SingleItemDetectionItem"
        errorCode:
          type: string
        errorMsg:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lockedAttributes:
          type: array
          items:
            type: string
          description: |
            Dotted attribute paths an admin has explicitly edited via
            PATCH; future regenerate preserves these values.
        audit:
          type: array
          items:
            $ref: "#/components/schemas/SingleItemDetectionAuditEntry"

    HitlQueuePage:
      type: object
      description: One page of HITL queue rows.
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SingleItemDetectionJob"
        nextCursor:
          type: string

    HitlReviewRequest:
      type: object
      description: Body for approve/reject. All fields optional.
      properties:
        reason:
          type: string

    HitlPatchAttributesRequest:
      type: object
      description: |
        Body for PATCH /admin/v1/items/{id}/attributes. Each key in
        `patches` is a dotted path into structuredDescription; the
        value overwrites whatever was there. Patched paths are added
        to the job's lockedAttributes so a future regenerate
        preserves them.
      required: [patches]
      properties:
        patches:
          type: object
          additionalProperties: true
        reason:
          type: string

    HitlRegenerateRequest:
      type: object
      required: [stage]
      properties:
        stage:
          type: string
          enum: [describe, generate]
          description: Which stage to re-run.
        reason:
          type: string

    ArchetypeDefaultItem:
      description: |
        Admin-curated wardrobe item that gets COPIED into a
        user's wardrobe at signup (or via the seed endpoint),
        keyed by archetype. Solves the cold-start problem —
        new users with no uploaded items can immediately
        generate outfits.
      type: object
      required: [id, archetype, category, label, imageUrl, createdAt]
      properties:
        id:
          type: string
          example: ad_a1b2c3d4
        archetype:
          type: string
          enum: [ruler, rebel, creator, lover, caregiver, hero, magician, jester, sage, innocent, explorer, everyman]
        category:
          type: string
          example: outerwear
        label:
          type: string
          example: Black leather biker jacket
        description:
          type: string
          description: |
            Free-form copy shown alongside the item in the
            user's wardrobe. Treated like the description an
            uploaded item would have — gives the user
            context for why this item exists in their
            wardrobe before they start uploading their own.
        imageUrl:
          type: string
        pngImageUrl:
          type: string
          description: Background-removed PNG; populated when the curator supplies one.
        traits:
          type: object
          additionalProperties:
            type: string
        structuredDescription:
          type: object
          additionalProperties: true
          description: |
            Closed-enum attribute paths (same shape produced
            by the singleItemDetection pipeline). Free-form
            map so the spec doesn't pin to one schema version.
        seededCount:
          type: integer
          description: Total user wardrobes that have received a copy of this row.
        createdBy:
          type: string
          description: Admin id that authored the item.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ArchetypeDefaultItemsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArchetypeDefaultItem"

    ArchetypeDefaultItemPatch:
      description: |
        Body for PATCH /admin/v1/archetype-defaults/{id}.
        Every field optional — only the supplied keys are
        updated, the rest stay as-is. Pass an explicit empty
        string to clear a string field.
      type: object
      properties:
        category:
          type: string
        label:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        pngImageUrl:
          type: string
        traits:
          type: object
          additionalProperties:
            type: string
        structuredDescription:
          type: object
          additionalProperties: true

    ArchetypeDefaultDetectionResult:
      description: |
        Wire shape returned by POST /admin/v1/archetype-defaults/detect.
        The FE uses these fields to prefill the new-default modal so
        the curator only has to confirm/edit (and pick an archetype +
        save). The image bytes are already persisted under `id` — the
        subsequent POST /admin/v1/archetype-defaults call should pass
        the same `imageUrl` straight through.
      type: object
      required: [id, imageUrl, category, label]
      properties:
        id:
          type: string
          description: |
            Future archetype_default_items._id. Pre-minted on detect
            so the upload bytes can be keyed against it.
          example: ad_b689d52d4f7b4b9d84a3c6e0b6f12c34
        imageUrl:
          type: string
          description: |
            Path the FE renders + the value to send back on create.
            Resolves via the public wardrobe ServeImage route, so
            seeded copies on user wardrobes also load without auth.
          example: /v1/wardrobe/items/ad_b689d52d4f7b4b9d84a3c6e0b6f12c34/image
        category:
          type: string
        label:
          type: string
        confidence:
          type: number
          format: float
        traits:
          type: object
          additionalProperties:
            type: string
        structuredDescription:
          type: object
          additionalProperties: true

    SeedFromArchetypeRequest:
      description: |
        Body for POST /admin/v1/users/seed-from-archetype/{userId}.
        Triggers a copy of the curated defaults for `archetype`
        into the user's wardrobe. `notes` lands in the audit
        row alongside the seededCount.
      type: object
      required: [archetype, notes]
      properties:
        archetype:
          type: string
          enum: [ruler, rebel, creator, lover, caregiver, hero, magician, jester, sage, innocent, explorer, everyman]
        notes:
          type: string
          description: Audit-trail rationale; required.

    SeedFromArchetypeResponse:
      type: object
      required: [userId, archetype, seededCount]
      properties:
        userId:
          type: string
        archetype:
          type: string
        seededCount:
          type: integer
          description: Number of items actually copied (may be less than the curated total if errors occurred).

paths:
  /admin/v1/auth/login:
    post:
      operationId: adminLogin
      summary: Sign in with email + password (+ optional TOTP).
      security: [] # unauthenticated entry point
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — access + refresh tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: |
            Invalid credentials. Same message for missing email and wrong
            password — never reveals whether an account exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/v1/auth/refresh:
    post:
      operationId: adminRefresh
      summary: Rotate the access + refresh token pair (refresh is single-use).
      security: [] # the refresh token IS the credential here
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued; old refresh token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Refresh token is unknown, expired, or already revoked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/v1/auth/mfa/challenge:
    post:
      operationId: adminMfaChallenge
      summary: Re-prove MFA on an authenticated session.
      tags: [auth]
      description: |
        Called by the FE when a privileged-action request (PII reveal,
        budget edit, model-routing PUT, detection rerun, …) returns
        a 401 with `requiresFreshMfa: true`. The handler verifies the
        TOTP/recovery code against the admin's MFA secret, bumps the
        session's mfa_at timestamp on both the new access token and
        the corresponding refresh-token row, and returns a fresh
        access token. The current refresh token is **not** rotated;
        the FE keeps it and pairs it with the new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaChallengeRequest"
      responses:
        "200":
          description: |
            MFA verified. Replace the in-memory access token with the
            value in the response and retry the original privileged
            action. The refresh token from the request remains valid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: |
            Wrong TOTP / recovery code, or the refresh token doesn't
            belong to the calling admin. Same opaque body as a
            generic 401 — the endpoint is intentionally not a
            credential oracle.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "412":
          description: |
            The admin has not enrolled MFA. No code can satisfy the
            challenge. The FE routes them to /settings to enroll
            before they retry the original privileged action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaEnrollmentRequiredResponse"

  /admin/v1/me:
    get:
      operationId: adminMe
      summary: Verify the current session and return the admin's identity.
      tags: [auth]
      responses:
        "200":
          description: The authenticated admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/build-info:
    get:
      operationId: adminBuildInfo
      summary: Backend version + commit SHA + environment.
      description: |
        Returned values change only on deploy. The admin UI fetches
        this once per session and renders it in the sidebar footer
        so operators always know which backend version is serving.
      tags: [auth]
      responses:
        "200":
          description: Build identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/overview:
    get:
      operationId: adminOverview
      summary: Top-line dashboard metrics + recent-activity feed.
      tags: [overview]
      parameters:
        - name: period
          in: query
          description: |
            Period selector for the headline metrics. Defaults to
            `today` when unset. Sparkline series are always 30 days
            regardless of period — they're the trend, not the
            headline.
          schema:
            $ref: "#/components/schemas/OverviewPeriod"
        - name: since
          in: query
          description: |
            RFC-3339 timestamp. When supplied (and within
            [1h, 14d] in the past), the response carries a
            `sinceLastVisit` delta — new errors / signups / spend
            change vs the equal-length prior window
            (mootd-admin#97). Out-of-range values are silently
            ignored — the field is absent on the response.
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Overview metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/v1/users:
    get:
      operationId: adminListUsers
      summary: Paginated list of users with per-user activity summary.
      tags: [users]
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Case-insensitive contains-match on email.
        - name: tier
          in: query
          schema:
            type: string
            enum: [free, paid, founder, beta]
        - name: active
          in: query
          schema: { type: boolean }
          description: When true, restrict to users active in the last 30 days.
        - name: sort
          in: query
          schema:
            type: string
            enum: [-signup, -last_active, -uploads, -outfits, -spend_7d]
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque pagination cursor from a prior response's `nextCursor`.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: One page of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}:
    get:
      operationId: adminGetUser
      summary: |
        Drill-through detail for a single user (P1-06). Foundation
        for the admin user-detail page; tabs (Wardrobe / Outfits /
        Moodboards / Budget) extend with paginated sub-endpoints in
        follow-up tickets.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/detection-runs/{id}:
    get:
      operationId: adminGetDetectionRun
      summary: |
        Archive of one detection submission (input photo + generated
        images + per-image cost). Looked up by the
        `detectionRunId` field on llm_calls rows tagged
        `feature: detection_*`.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Detection run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/detection-runs/versions:
    get:
      operationId: adminListDetectionVersions
      summary: |
        Distinct detection-version labels seen across detection_runs.
        Drives the rerun-modal dropdown so admins pick from versions
        the system has actually run before. Returns an empty list
        when no rerun has ever set the field — UI falls back to a
        free-text input in that case.
      tags: [traces]
      responses:
        "200":
          description: Versions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionVersionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/detection-runs/{id}/rerun:
    post:
      operationId: adminRerunDetectionRun
      summary: |
        Replay the archived photo from detection_runs/{id} through
        the detection pipeline and persist a child run row with
        `parent_run_id` set. Records an audit entry. The new run is
        observation-only — no wardrobe items are created from its
        output (see acceptance criteria on mootd-admin#15).
      description: |
        Privileged action. Gated by RequireFreshMFA — burns external
        API spend and writes a new detection_runs row. A 401 with
        `requiresFreshMfa: true` indicates the FE should pop the
        challenge modal before retrying.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionRunRerunRequest"
      responses:
        "200":
          description: Rerun queued + completed (synchronous today).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionRunRerunResponse"
        "401":
          description: |
            Either a generic auth failure or the privileged-action
            MFA freshness gate. Distinguish by `requiresFreshMfa: true`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/MfaChallengeRequiredResponse"
        "404":
          description: Original run or its archived photo not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Detection service failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/detection-runs/{id}/input-image:
    get:
      operationId: adminGetDetectionRunInputImage
      summary: |
        Stream the original photo the user uploaded for this
        detection run. Bytes come from the GridFS bucket where the
        wardrobe handler stored them at submit time.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image bytes (JPEG or PNG).
          content:
            image/*: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Image not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/users/{id}/outfits:
    get:
      operationId: adminListUserOutfits
      summary: |
        Paginated outfit batches (one per generation request) for a
        user (mootd-admin#11 Outfits tab). Each batch carries the
        3-4 candidates the LLM produced. Use the Moodboards tab to
        see which one was saved.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
      responses:
        "200":
          description: Outfits page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOutfitsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}/moodboards:
    get:
      operationId: adminListUserMoodboards
      summary: |
        Paginated saved moodboards for one user (mootd-admin#11
        Moodboards tab). Cursor pagination on createdAt desc.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Moodboards page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMoodboardsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}/spend:
    get:
      operationId: adminGetUserSpend
      summary: |
        30-day per-feature spend breakdown for one user (mootd-admin#11
        Spend tab). Zero-filled at the backend so the chart spacing
        is uniform.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Spend breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSpendBreakdown"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/users/{id}/budget:
    get:
      operationId: adminGetUserBudget
      summary: |
        Current per-user budget caps (P4-01 / mootd-admin#29).
        When the user has no override, returns the system defaults
        with `isDefault: true` so the UI can render them differently
        (italic, muted) and the admin knows whether they're
        editing-from-scratch or modifying an existing override.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Budget for the user (override or default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBudget"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: adminUpdateUserBudget
      summary: |
        Replace the per-user budget caps. Writes to the
        `user_budgets` collection (upsert by userId) and writes an
        audit row with action=`budget.update` and metadata carrying
        the old + new values + admin-supplied reason. Enforcement
        of these caps is a separate concern (mootd-admin#30 / P4-02).
      description: |
        Privileged action. Gated by RequireFreshMFA — raising a cap
        is essentially authorising spend. A 401 with
        `requiresFreshMfa: true` indicates the FE should pop the
        challenge modal before retrying.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBudgetUpdate"
      responses:
        "200":
          description: New budget after the update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBudget"
        "400":
          description: Invalid budget values or missing reason.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            Either a generic auth failure or the privileged-action
            MFA freshness gate. Distinguish by `requiresFreshMfa: true`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/MfaChallengeRequiredResponse"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/users/{id}/purge:
    delete:
      operationId: adminPurgeUser
      summary: |
        GDPR-style erasure performed on behalf of a user
        (P2-06 / mootd-admin#23). Wipes every per-user document
        across the events / outfits / wardrobe / moodboards /
        feedback / outfit_jobs / llm_calls / detection_runs /
        user_budgets / users collections. Writes an audit row
        recording who triggered the purge and the per-collection
        counts.
      description: |
        Privileged action. Two gates:
          - `users:purge` permission (admin role only).
          - MFA-verified token: the access token must carry
            `mfaVerified=true`. Returns 403 with
            `requireMfa: true` when the gate fails so the FE
            can prompt for re-authentication.

        Idempotent: running twice returns 404 the second time
        because the user record is gone.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurgeRequest"
      responses:
        "200":
          description: Purge succeeded; report carries per-collection counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurgeReport"
        "400":
          description: Missing `notes`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Permission denied or MFA re-verification required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User already purged or never existed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Purge service not wired in this build.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/users/{id}/tier:
    get:
      operationId: adminGetUserTier
      summary: |
        Current per-user tier (P4-05 follow-up — tier authoring).
        Pairs with /admin/v1/model-routing: the configured tier
        determines which provider serves outfit generation for
        this user. When the user has no override, returns the
        system default ("free") with `isDefault: true`.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tier for the user (override or default).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTier"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: adminUpdateUserTier
      summary: |
        Replace the user's tier. Writes to the `user_tiers`
        collection (upsert by userId) and writes an audit row with
        action=`user_tier.update` and metadata carrying the prior
        + new tier + admin-supplied reason. Requires
        `budgets:write` (the same permission that gates per-user
        budget edits — both shape what an individual user costs
        the platform).
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTierUpdate"
      responses:
        "200":
          description: New tier after the update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTier"
        "400":
          description: Invalid tier or missing reason.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks the `budgets:write` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/users/{id}/wardrobe:
    get:
      operationId: adminListUserWardrobe
      summary: |
        Paginated wardrobe items for a single user (mootd-admin#11
        wardrobe tab). Cursor pagination on createdAt desc.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Wardrobe page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWardrobePage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/traces:
    get:
      operationId: adminListTraces
      summary: |
        Paginated firehose of llm_calls rows with filters by user / model
        / feature / status / minimum cost / date range. Optionally
        streams the *entire* matched set as CSV when format=csv —
        bypassing cursor pagination — for ad-hoc export.
      tags: [traces]
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: feature
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [success, error, timeout]
        - name: minCost
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on createdAt (RFC-3339).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on createdAt (RFC-3339).
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: format
          in: query
          description: |
            Response format. Default `json` returns a TracesPage with
            cursor pagination. `csv` streams every row matching the
            filter (capped at 50_000) with a CSV `Content-Type` and
            `Content-Disposition: attachment` header. CSV exports are
            audited.
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: One page of LLM call snapshots, or a streamed CSV.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracesPage"
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/traces/{id}:
    get:
      operationId: adminGetTrace
      summary: |
        Single-call detail for the admin prompt viewer (P1-12 /
        mootd-admin#17). Returns the full llm_calls row including
        the archived system prompt + user message + raw model
        response + wardrobe item IDs at call time.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full trace detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMCallDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Trace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/traces/summary:
    get:
      operationId: adminTracesSummary
      summary: |
        Aggregate totals over the current /traces filter — count,
        spend, mean and p95 latency. Independent of pagination so the
        /traces page can show "1,234 calls · $45.20 · avg 4.2s ·
        p95 12.1s" above the table without scanning every page.
      tags: [traces]
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: feature
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [success, error, timeout]
        - name: minCost
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Aggregate over the filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracesSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/search:
    get:
      operationId: adminSearch
      summary: |
        Cross-collection search for the Cmd+K palette and (future)
        global search bar (mootd-admin#92). Today: user-by-email
        only. The kind dispatch in SearchHit is intentional so
        future kinds (trace, prompt, audit) extend without breaking
        callers.
      tags: [search]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: |
            Search query. Case-insensitive contains-match against
            indexed columns. <2 chars returns an empty result set
            (rather than a 400) so caller debouncing is forgiving.
      responses:
        "200":
          description: Search hits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/evals/sets:
    get:
      operationId: adminListEvalSets
      summary: |
        List available eval sets (P3-04 / mootd-admin#27).
        Sets are discovered from `backend/eval/golden/<name>/`
        directories on disk — admins can add new sets by checking
        in JSON files and restarting the backend. A future ticket
        adds an upload UI; today this is intentionally read-only.
      tags: [evals]
      responses:
        "200":
          description: Available eval sets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalSetsList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/evals/runs:
    get:
      operationId: adminListEvalRuns
      summary: |
        List eval runs in reverse chronological order. Each row
        carries the aggregate (pass rate, avg judge score, total
        cost) so the list is useful as a regression dashboard
        without drilling into per-case results.
      tags: [evals]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Paginated runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: adminStartEvalRun
      summary: |
        Kick off a new eval run against the active generator (the
        provider configured by OUTFIT_PROVIDER; per-run model
        selection is a follow-up ticket). Returns 202 immediately
        with a runId; the goroutine runs cases concurrently and
        writes progress to /evals/runs/{id} as it goes.
      tags: [evals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRunRequest"
      responses:
        "202":
          description: Run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunStart"
        "400":
          description: Unknown eval set or bad body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/evals/runs/{id}:
    get:
      operationId: adminGetEvalRun
      summary: |
        Full run detail — case-by-case results with judge score +
        rationale + generated outfit + cost. The list endpoint
        omits the cases array for compactness; this is where the
        admin drills in.
      tags: [evals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Run not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/model-routing:
    get:
      operationId: adminGetModelRouting
      summary: |
        Read the per-tier model routing config (P4-05 /
        mootd-admin#33). Ships seeded defaults at boot:
        free→ollama, paid/beta→anthropic, founder→anthropic.
        Admins edit via PUT.
      tags: [routing]
      responses:
        "200":
          description: Routing config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelRouting"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: adminUpdateModelRouting
      summary: |
        Replace the routing config. Writes an audit row with the
        old + new mapping + admin-supplied reason.
      description: |
        Privileged action. Gated by RequireFreshMFA — routing
        changes affect the active provider for an entire tier of
        users. A 401 with `requiresFreshMfa: true` indicates the FE
        should pop the challenge modal before retrying.
      tags: [routing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelRoutingUpdate"
      responses:
        "200":
          description: Updated routing config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelRouting"
        "400":
          description: Invalid tier or unknown provider.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            Either a generic auth failure or the privileged-action
            MFA freshness gate. Distinguish by `requiresFreshMfa: true`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/MfaChallengeRequiredResponse"

  /admin/v1/reports/weekly:
    get:
      operationId: adminGetWeeklyReport
      summary: |
        Render the weekly cost report (P4-04 / mootd-admin#32).
        Defaults to the most recently completed UTC week (Mon-Sun);
        the `week` query parameter overrides to a specific ISO week
        like "2026-W18" for backfill.
      tags: [reports]
      parameters:
        - name: week
          in: query
          schema: { type: string }
          description: ISO week label (YYYY-Www). Defaults to last completed week.
      responses:
        "200":
          description: Report payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReport"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/reports/weekly/send:
    post:
      operationId: adminSendWeeklyReport
      summary: |
        Manually trigger the weekly report email. Idempotent on
        retries — the report is recomputed from llm_calls each
        time. Returns 200 with the recipient + status; 503 when
        SMTP isn't configured (the rendered report is still
        viewable via GET).
      tags: [reports]
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReportSendResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: SMTP not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/sessions/events:
    post:
      operationId: adminRecordSessionEvent
      summary: |
        Record one admin-side request for the session-replay
        audit log (P5-05 / mootd-admin#38). The frontend's
        request() wrapper calls this fire-and-forget after every
        API request — method, path, status, duration. No body
        snapshots in v1; we explicitly trade "exact replay" for
        a tiny payload + clean privacy story.
      tags: [audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionEventRequest"
      responses:
        "204":
          description: Recorded.
        "400":
          description: Bad body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/sessions:
    get:
      operationId: adminListSessions
      summary: |
        List recent admin sessions, grouped by sessionId. Each
        row carries the admin id + first/last event timestamps +
        event count + distinct paths visited. Permission:
        sessions:view.
      tags: [audit]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        "200":
          description: Sessions page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing sessions:view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/sessions/{id}:
    get:
      operationId: adminGetSession
      summary: |
        All events for one session, in chronological order.
        Permission: sessions:view.
      tags: [audit]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Session detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing sessions:view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/funnels:
    get:
      operationId: adminListFunnels
      summary: |
        List saved funnels (P2-04 / mootd-admin#21).
        Permission: traces:read.
      tags: [analytics]
      responses:
        "200":
          description: Funnels list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: adminCreateFunnel
      summary: |
        Save a new funnel definition. Permission: prompts:write
        (used here as "can configure analyses" since funnels:write
        isn't a separate permission today).
      tags: [analytics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunnelCreate"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Funnel"
        "400":
          description: Bad body or unknown event name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/funnels/{id}:
    get:
      operationId: adminGetFunnel
      summary: Read one saved funnel. Permission traces:read.
      tags: [analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Funnel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Funnel"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/funnels/{id}/stats:
    get:
      operationId: adminGetFunnelStats
      summary: |
        Compute step-by-step pass-through rates for the funnel.
        Permission: traces:read.
      tags: [analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/retention:
    get:
      operationId: adminGetCohortRetention
      summary: |
        Cohort retention heatmap, computed live from the events
        collection (P2-05 / mootd-admin#22). 30 trailing buckets
        (days OR ISO weeks per cohortUnit) × n retention columns.
        Permission: traces:read.
      tags: [analytics]
      parameters:
        - name: cohortUnit
          in: query
          required: false
          schema:
            type: string
            enum: [day, week]
            default: day
        - name: n
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
      responses:
        "200":
          description: Heatmap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CohortRetentionResponse"
        "400":
          description: Invalid params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Retention reader not wired in this build.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/prompts:
    get:
      operationId: adminListPromptNames
      summary: |
        List the names of all configured prompt templates
        (P3-01 / mootd-admin#24). Permission: prompts:read.
      tags: [prompts]
      responses:
        "200":
          description: Names list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptNamesList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/prompts/{name}:
    get:
      operationId: adminListPromptVersions
      summary: |
        List every version of a named template, newest first.
        Permission: prompts:read.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Versions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptVersionsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: adminCreatePromptVersion
      summary: |
        Create a new version of a named template. Auto-numbered
        (max(existing) + 1); does NOT auto-promote.
        Permission: prompts:write.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptVersionCreate"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptTemplate"
        "400":
          description: Bad body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/prompts/{name}/{version}:
    get:
      operationId: adminGetPromptVersion
      summary: One specific version. Permission prompts:read.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/prompts/{name}/{version}/promote:
    post:
      operationId: adminPromotePromptVersion
      summary: |
        Promote a version to production. Atomic: sets
        isProduction=true on this row + false on every other
        version of the same name. Invalidates the in-process
        cache. Permission: prompts:write.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptPromoteRequest"
      responses:
        "200":
          description: New production version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptTemplate"
        "400":
          description: Version not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/prompts/{name}/ab-tests:
    get:
      operationId: adminListPromptABTests
      summary: List A/B tests on a template. Permission prompts:read.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tests list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ABTestsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: adminStartPromptABTest
      summary: |
        Start an A/B test (P3-05 / mootd-admin#28). At most one
        active test per template name. Permission prompts:write.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ABTestStart"
      responses:
        "201":
          description: Started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ABTest"
        "400":
          description: Bad body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A test is already active on this template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/prompts/{name}/ab-tests/end:
    post:
      operationId: adminEndPromptABTest
      summary: End the active test on a template. Permission prompts:write.
      tags: [prompts]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ABTestEnd"
      responses:
        "204":
          description: Ended.
        "400":
          description: No active test on this template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/traces/{id}/replay:
    post:
      operationId: adminReplayTrace
      summary: |
        Re-run an archived trace with the same prompt against
        Anthropic and persist a new llm_calls row with replayOf
        set (P3-03 / mootd-admin#26). v1 supports anthropic-
        provider traces only and uses the trace's archived
        prompt verbatim — no per-replay model or prompt-version
        override. Permission: traces:rerun.
      tags: [traces]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: New trace id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceReplayResponse"
        "400":
          description: Trace can't be replayed (no archived prompt or non-anthropic provider).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing traces:rerun.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Anthropic call failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: ANTHROPIC_API_KEY not set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/audit/pii-reveal:
    post:
      operationId: adminAuditPIIReveal
      summary: |
        Record an admin's PII reveal action (P5-04 / mootd-admin#37).
        Called by the FE every time the admin clicks to unblur a
        photo, reveal an email, or read an outfit-item label.
        Returns 204 (no body) on success; 403 when the admin
        lacks users:pii permission.
      description: |
        Privileged action. Gated by RequireFreshMFA — the session
        must have proven MFA in the last 10 minutes. A 401 with
        `requiresFreshMfa: true` indicates the FE should pop the
        challenge modal before retrying.
      tags: [audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PIIRevealRequest"
      responses:
        "204":
          description: Audited.
        "400":
          description: Bad body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            Either a generic auth failure (missing/expired token) or
            the privileged-action MFA freshness gate. Distinguish by
            the presence of `requiresFreshMfa: true` in the body.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/MfaChallengeRequiredResponse"
        "403":
          description: Missing users:pii permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/audit:
    get:
      operationId: adminListAudit
      summary: |
        Paginated audit-log feed. Foundation for the admin /audit
        page (mootd-admin#95). Filterable by action, target user,
        admin id, date range. Cursor pagination on (at desc, _id desc).
      tags: [audit]
      parameters:
        - name: action
          in: query
          schema: { type: string }
          description: Exact match. e.g. `traces.export`.
        - name: adminId
          in: query
          schema: { type: string }
        - name: targetUserId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `at` (RFC-3339).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on `at` (RFC-3339).
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: One page of audit entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/hitl-queue:
    get:
      operationId: adminListHitlQueue
      summary: |
        Paginated HITL queue from singleItemDetection orchestrator.
        Default filter is `hitl_only=true` — admins almost always
        want "what needs review" unless they explicitly query a
        terminal status.
      description: |
        Backed by the orchestrator's GET /v1/admin/hitl-queue.
        mootd backend proxies the request, forwarding admin auth.
      tags: [hitl]
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/SingleItemDetectionJobStatus"
        - name: category
          in: query
          schema:
            type: string
        - name: hitl_reason
          in: query
          schema:
            $ref: "#/components/schemas/SingleItemDetectionHitlReason"
        - name: hitl_only
          in: query
          schema:
            type: boolean
            default: true
        - name: confidence_min
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 1
        - name: confidence_max
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 1
        - name: sort
          in: query
          schema:
            type: string
            enum: [age, confidence]
            default: age
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: One page of HITL queue rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HitlQueuePage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/v1/items/{id}:
    get:
      operationId: adminGetSingleItem
      summary: |
        Full Job record for one HITL item: structuredDescription, all
        gate scores, audit trail, and lockedAttributes.
      tags: [hitl]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full job record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleItemDetectionJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/items/{id}/approve:
    post:
      operationId: adminApproveSingleItem
      summary: |
        Move a HITL item to the `reviewed` terminal state and append
        an audit entry. 409 when the item is still pending/running
        (must be cancelled first). 204 on success.
      tags: [hitl]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HitlReviewRequest"
      responses:
        "204":
          description: Approved.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found.
        "409":
          description: Item not yet terminal (cancel first).

  /admin/v1/items/{id}/reject:
    post:
      operationId: adminRejectSingleItem
      summary: Same shape as approve; status flips to `rejected`.
      tags: [hitl]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HitlReviewRequest"
      responses:
        "204":
          description: Rejected.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found.
        "409":
          description: Item not yet terminal.

  /admin/v1/items/{id}/attributes:
    patch:
      operationId: adminPatchSingleItemAttributes
      summary: |
        Overwrite specific dotted-path values inside the item's
        structuredDescription. Each patched path is added to the job's
        lockedAttributes so a future regenerate preserves the edit.
      tags: [hitl]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HitlPatchAttributesRequest"
      responses:
        "204":
          description: Patches applied + paths locked.
        "400":
          description: Empty patches map or invalid path.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found.

  /admin/v1/items/{id}/regenerate:
    post:
      operationId: adminRegenerateSingleItem
      summary: |
        Re-run a single stage (describe or generate) on an existing
        item. Locked attributes (admin's PATCH edits) are preserved.
        503 when the orchestrator wasn't booted with a Regenerator
        (e.g. ANTHROPIC_API_KEY missing for stage 2).
      tags: [hitl]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HitlRegenerateRequest"
      responses:
        "204":
          description: Stage re-run completed; item updated.
        "400":
          description: Missing or unknown stage.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Item not found.
        "409":
          description: Item not yet terminal (cancel first).
        "422":
          description: Re-run completed but produced no usable result.
        "503":
          description: Regenerator not configured.

  /admin/v1/archetype-defaults:
    get:
      operationId: adminListArchetypeDefaults
      summary: |
        List curated wardrobe defaults. Pass `?archetype=<key>`
        to filter to one archetype; omit for the global list.
        Permission: prompts:read.
      tags: [archetype-defaults]
      parameters:
        - name: archetype
          in: query
          required: false
          schema:
            type: string
            enum: [ruler, rebel, creator, lover, caregiver, hero, magician, jester, sage, innocent, explorer, everyman]
      responses:
        "200":
          description: Items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchetypeDefaultItemsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Archetype defaults repo not wired in this build.
    post:
      operationId: adminCreateArchetypeDefault
      summary: |
        Curate a new default for an archetype. Permission:
        prompts:write. The (archetype, category, label) triple
        is unique — a duplicate returns 409.
      tags: [archetype-defaults]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchetypeDefaultItem"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchetypeDefaultItem"
        "400":
          description: Missing required fields or unknown archetype.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write permission.
        "409":
          description: Duplicate (archetype + category + label) already exists.

  /admin/v1/archetype-defaults/detect:
    post:
      operationId: adminDetectArchetypeDefault
      summary: |
        Upload a photo and run it through the same single-item
        detection pipeline used by the mobile wardrobe upload, but
        return ONLY the description (label / category / traits /
        structuredDescription). The generated ghost-mannequin image
        is intentionally discarded — curated defaults always show
        the operator's upload, so users see real photos on first
        sign-in. The bytes are saved to the wardrobe-side image
        store under the returned id; the FE uses imageUrl for the
        modal preview AND passes the same imageUrl back when
        creating the archetype-default row.
        Permission: prompts:write.
      tags: [archetype-defaults]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Detection prefill.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchetypeDefaultDetectionResult"
        "400":
          description: Missing or empty image field.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write permission.
        "413":
          description: Image exceeds size limit.
        "502":
          description: Detection backend error.
        "503":
          description: Detect not wired (image store or detector unavailable).

  /admin/v1/archetype-defaults/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: adminGetArchetypeDefault
      summary: Read one curated default. Permission prompts:read.
      tags: [archetype-defaults]
      responses:
        "200":
          description: Default item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchetypeDefaultItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found.
    patch:
      operationId: adminUpdateArchetypeDefault
      summary: Patch any combination of fields. Permission prompts:write.
      tags: [archetype-defaults]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchetypeDefaultItemPatch"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchetypeDefaultItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write permission.
        "404":
          description: Not found.
    delete:
      operationId: adminDeleteArchetypeDefault
      summary: |
        Remove the curated default. Wardrobe items already
        seeded from this row stay intact (they're copies, not
        references). Permission prompts:write. Audited.
      tags: [archetype-defaults]
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing prompts:write permission.
        "404":
          description: Not found.

  /admin/v1/users/seed-from-archetype/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: adminSeedWardrobeFromArchetype
      summary: |
        Copy curated defaults for the given archetype into the
        target user's wardrobe. Permission users:purge. Audited
        with the seededCount + admin-supplied notes.
      tags: [archetype-defaults]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedFromArchetypeRequest"
      responses:
        "200":
          description: Seeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedFromArchetypeResponse"
        "400":
          description: Missing archetype or notes.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing users:purge permission.
        "404":
          description: User not found.
        "503":
          description: Wardrobe seeder not wired in this build.

tags:
  - name: auth
    description: Login + refresh.
  - name: overview
    description: Dashboard top-line metrics.
  - name: audit
    description: Audit log feed.
  - name: search
    description: Cross-collection search for the command palette.
  - name: users
    description: User list + drill-through.
  - name: traces
    description: LLM calls + (eventually) detection runs.
  - name: hitl
    description: |
      singleItemDetection HITL queue — list, approve, reject, PATCH
      attributes, re-run a stage. Backed by the orchestrator's
      /v1/admin/* endpoints (mootd backend proxies).
  - name: archetype-defaults
    description: |
      Admin-curated wardrobe items keyed by archetype. Copied
      into users' wardrobes at signup or via the seed endpoint
      so cold-start sign-ups can immediately generate outfits.
